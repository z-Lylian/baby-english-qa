  var h = '<ul class="word-list' + (hasImg2 ? ' has-img' : '') + '">';
  for(var j = 0; j < words.length; j++) {
    var w = words[j], key = makeWordKey(qIdx, sIdx, j, w.en);
    var ipa = w.ipa ? '<span class="word-ipa">' + w.ipa + '</span>' : '';
    var safeEn = w.en.replace(/'/g, "&apos;").replace(/"/g, '&quot;');
    var isFav = favStorage.isFav(key), sc = 'star-btn' + (isFav ? ' active' : ''), si = isFav ? '⭐' : '☆', lc = isFav ? ' starred' : '';
    var imgHtml = '';
    if(w.img) imgHtml = '<img class="word-img" src="' + w.img + '" alt="' + safeEn + '" loading="lazy" onerror="this.style.display=\'none\'">';
    h += '<li class="' + lc + '">' + imgHtml + '<div class="word-text"><span class="word-en">' + w.en + '</span>' + ipa + '<span class="word-cn">' + w.cn + '</span></div><div class="action-btns"><button class="' + sc + '" data-action="fav" data-key="' + key + '" title="收藏">' + si + '</button><button class="speak-btn" data-action="speak" data-text="' + safeEn + '" title="点击发音">🔊</button></div></li>';
  }
  return h + '</ul>';
}

function renderQA(data) {
  var l = document.getElementById('qa-list');
  if(!data || data.length === 0) { l.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>没有找到匹配的问题</p></div>'; return; }
  var groups = {};
  data.forEach(function(q) { if(!groups[q.category]) groups[q.category] = []; groups[q.category].push(q); });
  var h = '';
  var keys = Object.keys(groups);
  for(var k = 0; k < keys.length; k++) {
    var cat = keys[k], items = groups[cat], conf = catConfig[cat] || { name: cat, emoji: '📌' };
    h += '<div class="category-section" data-cat="' + cat + '"><div class="category-title"><span class="emoji">' + conf.emoji + '</span>' + conf.name + '<span class="count">' + items.length + '</span></div>';
    for(var i = 0; i < items.length; i++) {
      var q = items[i], qIdx = qaData.indexOf(q);
      h += '<div class="qa-card" id="toc-' + cat + '-' + i + '"><div class="question"><span class="q-badge">Q</span>' + (q.displayTitle || q.question) + '</div><div class="answer">';
      if(q.sections) { for(var j = 0; j < q.sections.length; j++) { h += '<div class="section-title">' + q.sections[j].title + '</div>'; h += buildWordList(q.sections[j].words, qIdx, j); } }
      else if(q.answer) { h += q.answer; }
      if(q.tip) h += '<div class="tip-box">💡 ' + processTip(q.tip) + '</div>';
      h += '</div>';
      if(q.tags && q.tags.length) { h += '<div class="tags">'; for(var t = 0; t < q.tags.length; t++) h += '<span class="tag">' + q.tags[t] + '</span>'; h += '</div>'; }
      h += '<div class="date">' + (q.date || '') + '</div></div>';
    }
    h += '</div>';
  }
  l.innerHTML = h;
}

function renderFavorites() {
  var l = document.getElementById('qa-list'), fk = favStorage.getKeys();
  if(fk.length === 0) { l.innerHTML = '<div class="empty-state"><div class="emoji">🌟</div><p>还没有收藏的单词<br>点击单词旁边的 ☆ 来收藏吧</p></div>'; return; }
  var grouped = {};
  for(var i = 0; i < fk.length; i++) {
    var key = fk[i], p = key.split('-'), qi = parseInt(p[0]), si = parseInt(p[1]), wi = parseInt(p[2]), en = p.slice(3).join('-');
    if(!grouped[qi]) grouped[qi] = {};
    if(!grouped[qi][si]) grouped[qi][si] = [];
    grouped[qi][si].push({ idx: wi, en: en });
  }
  var h = '';
  var qks = Object.keys(grouped).sort(function(a,b) { return parseInt(a) - parseInt(b); });
  for(var qi = 0; qi < qks.length; qi++) {
    var qiN = qks[qi], q = qaData[parseInt(qiN)];
    if(!q) continue;
    h += '<div class="qa-card"><div class="fav-source-label">' + (q.displayTitle || q.question) + '</div>';
    if(q.sections) {
      for(var si = 0; si < q.sections.length; si++) {
        if(!grouped[qiN][si]) continue;
        var sec = q.sections[si], fws = grouped[qiN][si].sort(function(a,b) { return a.idx - b.idx; });
        h += '<div class="fav-section-title">' + sec.title + '</div><ul class="word-list">';
        for(var fw = 0; fw < fws.length; fw++) {
          var w = sec.words[fws[fw].idx];
          if(!w) continue;
          var wKey = makeWordKey(parseInt(qiN), si, fws[fw].idx, w.en);
          var ipa = w.ipa ? '<span class="word-ipa">' + w.ipa + '</span>' : '';
          var safeEn = w.en.replace(/'/g, "&apos;").replace(/"/g, '&quot;');
          h += '<li class="starred"><span class="word-en">' + w.en + '</span>' + ipa + '<span class="word-cn">' + w.cn + '</span><div class="action-btns"><button class="star-btn active" data-action="fav" data-key="' + wKey + '" title="取消收藏">⭐</button><button class="speak-btn" data-action="speak" data-text="' + safeEn + '" title="点击发音">🔊</button></div></li>';
        }
        h += '</ul>';
      }
    }
    h += '</div>';
  }
  l.innerHTML = h;
}

// ===== Filtering =====
var activeCat = 'all';

function applyFilters() {
  var sb = document.getElementById('sentence-builder');
  var ql = document.getElementById('qa-list');
  var sbox = document.getElementById('search-box');

  if(activeCat === 'random') {
    sb.className = 'active';
    ql.style.display = 'none';
    sbox.style.display = 'none';
    return;
  }
  sb.className = '';
  ql.style.display = '';
  sbox.style.display = '';

  if(activeCat === 'favorites') {
    renderFavorites();
    var q = document.getElementById('search').value.toLowerCase();
    if(q) { var lis = document.querySelectorAll('#qa-list .word-list li'); for(var i = 0; i < lis.length; i++) lis[i].style.display = lis[i].textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none'; }
    return;
  }
  var q = document.getElementById('search').value.toLowerCase(), f = qaData;
  if(activeCat !== 'all') f = f.filter(function(x) { return x.category === activeCat; });
  if(activeCat === 'growth') f.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
  if(q) { f = f.filter(function(x) { var t = (x.displayTitle || x.question).toLowerCase(), aw = ''; if(x.sections) for(var i = 0; i < x.sections.length; i++) for(var j = 0; j < x.sections[i].words.length; j++) aw += x.sections[i].words[j].en + ' ' + x.sections[i].words[j].cn + ' '; return t.indexOf(q) >= 0 || aw.toLowerCase().indexOf(q) >= 0 || (x.tags && x.tags.some(function(tg) { return tg.toLowerCase().indexOf(q) >= 0; })); }); }
  renderQA(f);
}

// ===== Event Listeners =====
document.getElementById('cat-nav').addEventListener('click', function(e) {
  var btn = e.target.closest('.cat-btn');
  if(btn) {
    var allBtns = document.querySelectorAll('.cat-btn');
    for(var i = 0; i < allBtns.length; i++) allBtns[i].classList.remove('active');
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
    // 显示/隐藏悬浮目录按钮
    var stb = document.getElementById('subTocBtn');
    stb.style.display = (activeCat !== 'all' && activeCat !== 'favorites' && activeCat !== 'random') ? 'flex' : 'none';
    // 更新折叠标签
    var conf = catConfig[activeCat] || { name: activeCat, emoji: '📌' };
    document.getElementById('active-cat-emoji').textContent = btn.textContent.trim().split(' ')[0];
    document.getElementById('active-cat-name').textContent = (conf.emoji + ' ' + conf.name).replace(conf.emoji + ' ', '');
    // 自动收起
    document.getElementById('cat-nav').classList.remove('open');
    // Scroll to top
    window.scrollTo(0, 0);
    return;
  }
  // 点击toggle区域展开/收起
  if(e.target.closest('#cat-nav-toggle')) {
    document.getElementById('cat-nav').classList.toggle('open');
  }
});

updateFavCount();
document.getElementById('ageBadge').textContent = '🍼 宝宝月龄：' + getBabyAge() + ' | ' + getAgeStageTip();
applyFilters();

</script>

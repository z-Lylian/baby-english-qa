<script>
// ===== Baby Age Calculator =====
var BABY_BIRTH = new Date('2025-01-24');
function getBabyAge() {
  var now = new Date(), y = now.getFullYear() - BABY_BIRTH.getFullYear(), m = now.getMonth() - BABY_BIRTH.getMonth(), d = now.getDate() - BABY_BIRTH.getDate();
  if(d < 0) { m--; var prev = new Date(now.getFullYear(), now.getMonth(), 0); d += prev.getDate(); }
  if(m < 0) { y--; m += 12; }
  var totalMonths = y * 12 + m;
  if(y > 0 && m > 0) return y + '岁' + m + '个月（' + totalMonths + '个月）';
  if(y > 0) return y + '岁（' + totalMonths + '个月）';
  return m + '个月';
}
function getBabyTotalMonths() {

不假思索就理解</b>（不需要辅助手势或翻译）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📐 扩展顺序：</b><br><code>单一词 → 固定短句 → 句型换词 → 句型加修饰语 → 新句型</code><br>就像做实验——<b>一次只能改一个条件</b>，才能看清因果关系。</div>","tip":"牢记：一次只动一个变量。妈妈觉得\"太简单了\"的时候，正是宝宝在巩固的时候。不要急着加新东西！","category":"methods","tags":["已知区域","可理解性输入","i+1","扩展顺序"],"date":"2026-07-02"},{"question":"几岁启蒙最合适？各年龄段启蒙要领？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 核心观点：越早越好</b><br>几岁启蒙一定程度上决定达到的高度。<b>语言敏感期</b>启蒙最高效。</div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>⚠️ 关键时间线：</b><br>0-6个月：宝宝能探测周围<b>所有语言</b>的发音<br>6个月-1岁：逐渐失去这种能力，只能辨认自己语言中有的音<br>5-7岁：对<b>自然拼读</b>理解最好</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>👶 0-2岁（黄金期）</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">1. 妈妈会英语 → 从<b>怀孕</b>就开始说、唱儿歌、说简单句子，出生后坚持<br>2. 7-8个月引入<b>绘本</b><br>3. 素材：SSS儿歌、We Sing、亲子口语<br>4. <b>1岁以内只做人-人交流</b>，不人-机交流（反应性差、视力不好）<br>5. 2岁以内：妈妈学Susan老师视频 → 用Susan方法教宝宝</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🧒 2-5岁（高效期）</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">1. <b>听说先行</b><br>2. 3岁前 > 3岁后。3岁前可借助单词卡（名词+动词）做基础铺垫<br>3. <b>普通家庭3岁很合适</b>，不建议3岁后才开始<br>4. 实践经历：3岁开始的孩子 → 一年级时听说口语+大量词汇积累 → 后续学习顺利；<br>&nbsp;&nbsp;&nbsp;&nbsp;一年级才开始 → 没有自然拼读积累，听说读写一起做 + 其他学科压力 → 进步慢<br>5. <b>2岁以上</b>可以看Susan的视频</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📚 小学阶段</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">1. <b>6岁启蒙</b>：听说加强 + 自然拼读（5-7岁理解最佳）<br>2. <b>三年级开始</b>：没时间慢慢来 → 建议报班+系统教材+家庭辅助<br>3. <b>最晚不超过三年级</b>。要在小学搞定英语，原因：<br>&nbsp;&nbsp;&nbsp;ⅰ. 初中：青春期叛逆 + 家长更年期 = 双重阻力<br>&nbsp;&nbsp;&nbsp;ⅱ. 初中学习压力大 → 没时间<br>&nbsp;&nbsp;&nbsp;ⅲ. 逻辑思维 > 语言感知 → 想表达深刻但语言不够，很受挫<br>&nbsp;&nbsp;&nbsp;ⅳ. 自尊心强 → 不敢开口</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📌 特别注意</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">• 3-6岁：<b>大量积累、横向扩展</b>，不急刷分级<br>• 打牢听说基础 → 再学自然拼读 → 听说词汇转化为阅读词汇<br>• <b style=\"color:#dc2626\">鼓励鼓励再鼓励，千万不要指责孩子</b></div>","tip":"你家宝宝17个月，正处于黄金期！2岁以内妈妈学Susan方法教宝宝，2岁后可以看Susan视频。现在坚持亲子口语+儿歌+绘本就够了。","category":"methods","tags":["启蒙年龄","语言敏感期","各年龄段","0-2岁","2-5岁","小学"],"date":"2026-07-02"},{"question":"什么是可理解性输入？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 定义</b><br>在各种环境下，大脑先获取了信息，然后把听到的语言和信息<b>匹配</b>。语言不是孤立存在的，必须附着在具体的事物和情境上。</div><div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>📊 可理解性输入的来源构成：</b><br>• <b>肢体语言</b> — 占比约<b>85%</b>！（所以孩子要看老师的视频，模仿老师的动作和表情）<br>• 上下文情境<br>• 环境线索<br>• 已知区域（已掌握的语言和知识）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🧠 五感记忆原理</b><br>大脑的记忆基于<b>五感</b>。除了语言，要方方面面刺激，充分调动五感。<br>例：学习 <i>spicy</i> 时，可以给宝宝尝辣的食物 → 味觉+语言绑定，记忆更深刻。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>⚠️ 三大禁忌</b></div><div style=\"padding:0.4rem 0 0.2rem 1rem\"><b>❌ 1. 非常不建议盲听</b><br><span style=\"color:#6b7280\">盲听 = 非可理解性输入。建立已知区域经常失败的原因就是盲听、人机交流而非人人交流。</span><br><span style=\"color:#6b7280\">正确做法：先把视频看熟，视频印象已经存在大脑中后，才可以听音频。</span></div><div style=\"padding:0.4rem 0 0.2rem 1rem\"><b>❌ 2. 不要给孩子翻译</b><br><span style=\"color:#6b7280\">给孩子翻译是在<b>破坏可理解性输入</b>，强行干扰英语语言和事物的直接对应关系。<br>正确做法：用动作、表情、实物让孩子理解含义，而非中文翻译。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>❌ 3. 最初输入不要太杂</b><br><span style=\"color:#6b7280\">话题、口音、素材要统一，不要东一个西一个。重复 → 逐渐内化 → 建立已知区域，再缓慢扩展。</span></div>","tip":"可理解性输入的核心：让英语和真实事物/情境直接挂钩，不要让中文当中间人。妈妈做TPR动作就是在创造可理解性输入！","category":"methods","tags":["可理解性输入","Comprehensible Input","肢体语言","五感","盲听","翻译"],"date":"2026-07-02"},{"question":"什么是横向扩展与纵向扩展？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 核心原则：横向扩展做足，纵向扩展不着急</b></div><div style=\"padding:0.6rem 0;background:#f0fdf4;border-radius:10px;padding:10px 14px;border-left:4px solid #22c55e;font-size:0.85rem\"><b>➡️ 横向扩展（Horizontal）</b><br>用<b>更多同级别</b>的读物和素材，扩充孩子的<b>单词量</b>和<b>认知广度</b>。<br>→ 量变积累，厚积薄发</div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>⬆️ 纵向扩展（Vertical）</b><br>进入<b>更高难度级别</b>的学习。<br>⚠️ 前提条件：孩子的<b>智力</b>和<b>语言能力</b>都达到一定水平才可以。<br>→ 不可拔苗助长</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📌 实操理解</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">横向扩展就像<b>铺地基</b>——同一层面铺得越宽越厚，上面才能盖得越高。<br>如果横向没做足就急着纵向拔高，基础不牢，后面会塌。<br><br>✅ 横向做足的表现：<br>• 同级别词汇量大、反应快<br>• 听到同级内容能轻松理解<br>• 表达自信、不犹豫<br><br>这时才可以考虑纵向进入下一级。</div>","tip":"简单记：横向=同级别多看多听（铺宽），纵向=升难度级别（爬高）。先铺宽再爬高，千万别反过来！","category":"methods","tags":["横向扩展","纵向扩展","分级阅读","积累","进阶"],"date":"2026-07-02"},{"question":"孩子听不懂，要给他翻译吗？不翻译，怎么知道孩子懂不懂？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 结论：不翻译</b></div><div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>📏 按年龄处理：</b><br>• <b>3岁以前</b>：完全不用翻译，靠肢体语言、实物、情境理解<br>• <b>3岁以后</b>：也不翻译，但要<b>降级操作</b>（回到孩子能理解的水平重新输入）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🔍 如何判断孩子已经掌握一个单词？</b><br>关键标准：在<b>英文环境</b>中识别并使用，而不是单词与汉语对应。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🎮 猜词游戏（检测+巩固掌握）</b><br>用英文描述让孩子猜，完全在英文环境中进行：</div><div style=\"padding:0.6rem 0;background:#f0fdf4;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>例：watermelon</b><br>家长描述：<i>It's big. It's green outside and red inside. It's juicy and sweet.</i><br>孩子猜：<i>Watermelon!</i></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>两种玩法：</b><br>1. <b>正向猜词</b>：家长用英文描述 → 孩子猜单词<br>2. <b>反向猜词</b>：孩子用英文描述 + 家长引导式提问 → 家长猜<br><br>反向猜词特别锻炼孩子的<b>表达能力</b>，家长可以故意猜错，让孩子补充更多描述。</div>","tip":"猜词游戏是检测掌握的最好方法！既不依赖翻译，又能锻炼英文思维。建议17个月宝宝先积累更多词汇，2岁左右可以开始简单的猜词互动。","category":"methods","tags":["翻译","降级操作","猜词游戏","检测掌握","英文思维"],"date":"2026-07-02"},{"question":"磨耳朵有用吗？听力练习怎么做？为什么反对盲听启蒙？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 核心观点：磨耳朵≠随便放背景音，必须有条件地使用</b></div><div style=\"padding:0.6rem 0;background:#fef2f2;border-radius:10px;padding:10px 14px;border-left:4px solid #ef4444;font-size:0.85rem\"><b>⚠️ 反对盲听的原因</b><br>• 长时间磨耳朵对<b>身体发育</b>、<b>注意力</b>都有负面影响<br>• <b>1岁之前不要磨耳朵</b>——宝宝只对人-人交流有反应，对背景音无感<br>• 儿歌也不能纯听，需要配合表演/绘本/视频<br>• 不符合可理解性输入原则的磨耳朵 = 听到的都是乱码</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>✅ 正确的听力练习方式</b></div><div style=\"padding:0.4rem 0 0.2rem 1rem\"><b>1. 内容必须已达可理解性输入标准：</b><br>• 看过很多遍但还达不到自己输出水平 → 通过磨耳朵加深记忆和理解 ✅<br>• 在语言能力范围内引入新故事，能听懂 → 可以听 ✅<br>• 完全没基础就盲听 → ❌</div><div style=\"padding:0.4rem 0 0.2rem 1rem\"><b>2. ⏰ 什么时候听（碎片时间）：</b><br>起床后、刷牙时、早饭前、睡觉前、开车路上等</div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>3. 🚫 什么时候不听：</b><br><b style=\"color:#dc2626\">孩子在专注做事的时候不听！</b>不要打断孩子的专注力。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📦 素材选择原则</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">• 信息量要够（因此磨耳朵更适合<b>大宝宝</b>，有一定基础后才有意义）<br>• 选孩子<b>感兴趣</b>的素材</div>","tip":"你家宝宝17个月，还不适合磨耳朵。现在重点是妈妈学Susan方法，通过人-人互动输入。等宝宝2岁后有一定积累了，再在碎片时间放听过的音频加深印象。","category":"methods","tags":["磨耳朵","听力练习","盲听","背景音","碎片时间","专注力"],"date":"2026-07-02"},{"question":"什么是高效学习？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 高效学习模式 = Focus + Diffuse 结合</b></div><div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🧠 两种大脑模式</b><br><br><b>Focus模式（专注模式）</b><br>• 大脑集中注意力，主动学习新知识<br>• 适合：学新词、新句型、跟读、互动练习<br><br><b>Diffuse模式（发散模式）</b><br>• 大脑放松，用<b>潜意识</b>消化和整合已学内容<br>• 适合：学完后休息、睡觉、自由玩耍<br><br>两种模式<b>交替进行</b>才能高效学习</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📌 高效学习的三个关键</b></div><div style=\"padding:0.4rem 0 0.2rem 1rem\"><b>1. 轻松愉快</b><br><span style=\"color:#6b7280\">学习必须在愉快的状态下进行。压力、焦虑、紧张会阻碍大脑吸收语言。宝宝开心时大脑最开放，吸收效率最高。</span></div><div style=\"padding:0.4rem 0 0.2rem 1rem\"><b>2. 有反馈</b><br><span style=\"color:#6b7280\">学了要有回应——宝宝的一个眼神、一个动作、一个发音尝试，都是反馈。没有反馈的输入是低效的。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>3. 用潜意识获取</b><br><span style=\"color:#6b7280\">Focus学完 → Diffuse让大脑后台处理 → 下次Focus时发现\"突然懂了\"。这就是为什么宝宝睡一觉醒来突然会说一个昨天听过的词。</span></div>","tip":"实操建议：每次学习10-15分钟（Focus），然后让宝宝自由玩耍休息（Diffuse）。不要一天安排太长时间的高强度学习！","category":"methods","tags":["高效学习","Focus模式","Diffuse模式","潜意识","反馈","轻松愉快"],"date":"2026-07-02"},{"question":"Susan四件套怎么用？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 Susan启蒙四件套（第一桶金）</b><br>提供最基础的听说能力，同时积累单词。包括 <b>100个名词 + 100个动词 + 100个形容词 + 万物贴</b>，可扩展的内容远不止几百个。</div><div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>👶 适合年龄：全年龄段，0基础适用</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📖 六步使用法（由浅入深）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 1️⃣ 指认名词卡</b>（最小5个月左右可开始）<br><span style=\"color:#6b7280\">如 <i>pig</i>：This is a pig. It is a pig. 能指认就可以。<br>学习各种游戏，保证过程有趣。<br>引导人用<b>整句</b>，其实就是Susan输出视频前20集的基础句型。</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 2️⃣ 扩展描述</b><br><span style=\"color:#6b7280\">在指认基础上加描述：The pig is a <b>pink</b> animal.<br>同时看其他粉色卡片引入 pink。<br>What is the animal? 找几个动物卡片：<i>The dog is an animal. The cat is an animal...</i></span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 3️⃣ 整句听力 + 猜词训练</b><br><span style=\"color:#6b7280\">卡片下方的句子帮助做解释。<br>做猜词游戏：家长描述孩子猜 / 孩子描述家长猜。</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 4️⃣ 引导输出训练</b><br><span style=\"color:#6b7280\">名词卡 + 动词卡组合 → 造完整句子 → 编故事：<br><i>The dog is dancing. The cat is sleeping on the bed...</i></span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 5️⃣ 音素意识训练</b><br><span style=\"color:#6b7280\">卡片单词中<b>彩色的字母</b>，学习时有意识地积累，为自然拼读打基础。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>Step 6️⃣ 万物贴（营造语言环境）</b><br><span style=\"color:#6b7280\">把贴纸贴在家中对应物品上，让孩子随时随地看到英文与实物对应，打造沉浸式环境。</span></div>","tip":"你家宝宝17个月，现在重点在 Step 1（指认名词卡）。配合网页里的随机组句闪卡功能，一张一张慢慢来，每次不要超过5张新卡！","category":"methods","tags":["Susan四件套","名词卡","动词卡","形容词卡","万物贴","指认","第一桶金"],"date":"2026-07-02"},{"question":"第一桶金视频看几遍？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 核心原则：多多益善，根据孩子需求来</b></div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>📺 什么时候可以给孩子看视频？</b><br>接近 <b>2岁</b> 的时候。2岁前妈妈自己学，用Susan方法教宝宝。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📋 看多少遍？分两种情况：</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>👶 孩子小（愿意重复）</b><br><span style=\"color:#6b7280\">孩子天然喜欢重复，看多少遍都行，重复是学习语言的核心方式。不要觉得\"又看这一集\"就着急换新的。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>🧒 孩子大（不愿意重复）</b><br><span style=\"color:#6b7280\">可以建立<b>激励机制</b>，保证精看+泛看结合：</span><br><br><span style=\"color:#6b7280\"><b>精看（精学）</b>：<br>• 一张单词卡对应视频，看完后要求孩子自己输出<br>• 规定一周每天都要看<br>• 目标：能独立输出该卡内容</span><br><br><span style=\"color:#6b7280\"><b>泛看（泛学）</b>：<br>• 其他视频可以自由看<br>• 扩展兴趣、增加输入量<br>• 不要求输出</span></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee;font-size:0.82rem;color:#6b7280\"><b>💡 一句话总结：有精有泛，精的视频反复看直到能输出，泛的视频自由看增加兴趣。</b></div>","tip":"你家宝宝17个月，还不到看视频的年龄。现在妈妈先看视频学方法，等宝宝接近2岁再开始看。到时候从名词卡对应的视频开始，每天看一遍。","category":"methods","tags":["第一桶金","视频","重复","精看","泛看","输出"],"date":"2026-07-02"},{"question":"常速语境视频什么时候看？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 常速语境视频是什么？</b><br>常速提升视频——将所有基础句型<b>结合在一起</b>，围绕一个主题讨论。不是零散学句型，而是在<b>真实语境</b>中综合运用。</div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>⚠️ 前提条件：必须先构建基础句型</b><br>看常速语境视频之前，孩子需要有一定的听说基础，能把单个句型用起来。没有基础直接看常速视频 = 盲听，无效。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📐 学习顺序</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\"><code>四件套指认（基础词汇）→ 第一桶金视频（基础句型）→ 常速语境视频（综合运用）</code><br><br>基础句型构建好之后，常速语境视频帮助孩子在真实对话场景中融会贯通，是从\"会单个句型\"到\"能流畅交流\"的关键一步。</div>","tip":"你现在和宝宝还在四件套指认阶段，离常速语境视频还很远。先踏实把名词卡、动词卡的基础打好，一步步来！","category":"methods","tags":["常速语境视频","常速提升","基础句型","综合运用","学习顺序"],"date":"2026-07-02"},{"question":"Start With Susan / 开口利器 / 引导输出ABCD视频怎么用？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 引导输出视频 = 200集，教孩子从\"听懂\"到\"能说\"</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📺 视频包括什么？</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>第一部分：</b>基于名词卡和动词卡的<b>基础句型</b>展示（自己要根据演示做更多练习）<br><b>第二部分：</b><b>猜词训练</b><br><b>第三部分：</b><b>True or False</b></div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>⏰ 什么时候开始？</b><br>基础句型构建可以和单词指认<b>同时进行</b>！做指认时鼓励用整句，其实就是引导输出视频前20集的基础句型。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📖 怎么用？</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 1️⃣ 基础句型构建</b><br><span style=\"color:#6b7280\">• 建议<b>一周学1-2个句型</b>，不要着急<br>• 学完演示句型 ≠ 跟读就够 → 要用别的卡片套用练习<br>• 随机抽取卡片练句型（网页随机组句功能可以用！）<br>• 引入队友，调动积极性</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 2️⃣ 猜词训练</b><br><span style=\"color:#6b7280\"><b>名词猜词：</b>基于卡片下方句子 → 开始要<b>慢速</b>，突出重点词 → 同时听常速语境视频提高听力 → 逐渐过渡到快速猜词<br><br><b>动词猜词：</b>用<b>「我演你猜」</b>游戏方式</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 3️⃣ True or False</b><br><span style=\"color:#6b7280\">名词、名词+动词混搭，判断对错</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>Step 4️⃣ 同时跟进听力视频</b><br><span style=\"color:#6b7280\">引导输出和听力要并行，不能只输出不听</span></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🎯 看视频应达到的目的</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\"><b>听+说：</b>猜词（用英文学英文）<br><b>表达：</b>综合应用词汇，熟悉句法结构，<b>强调整句输出</b><br>→ 2-3岁之间<b>不要求</b>整句输出<br>→ 3岁以上<b>应当要求</b>整句输出</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>⭐ 基础句型构建·四要四不要</b></div><div style=\"padding:0.4rem 0 0.3rem 1rem\"><b style=\"color:#16a34a\">✅ 要重视，不要轻视</b><br><span style=\"color:#6b7280\">学过了 ≠ 会了。要练习到张嘴就来，熟练运用才是「会」</span></div><div style=\"padding:0.3rem 0 0.3rem 1rem\"><b style=\"color:#16a34a\">✅ 要用够，不要满足于跟读</b><br><span style=\"color:#6b7280\">通过各种游戏把一个句型学会了再引入下一个。高效实操也要1-2周。没有足够时间，孩子无法内化。</span></div><div style=\"padding:0.3rem 0 0.3rem 1rem\"><b style=\"color:#16a34a\">✅ 要有趣，不要枯燥</b><br><span style=\"color:#6b7280\">游戏化、引入队友、打比赛</span></div><div style=\"padding:0.3rem 0 0.6rem 1rem\"><b style=\"color:#16a34a\">✅ 要联系实际，不要应付差事</b><br><span style=\"color:#6b7280\">比如学 <i>That is</i> → 出去看远处 <i>What is that? That is a tree/bird/car...</i> 场景丰富。闪卡与实物的相似度没那么重要。</span></div>","tip":"四要四不要是核心心法！你做指认时已经在用前20集句型了，这就是在同步构建基础句型。一周1-2个句型，不着急。","category":"methods","tags":["引导输出","Start With Susan","开口利器","ABCD视频","四要四不要","猜词训练","句型构建"],"date":"2026-07-02"},{"question":"没时间怎么办？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 核心观点：时间不够 = 启蒙晚了</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>👶 孩子没时间</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">解决方法：<b>提早启蒙，越早越好</b>。<br>越早开始，孩子的时间越充裕，压力越小。等到上学再开始，就要和其他学科抢时间。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🧑 家长没时间</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>1. 不用卡2个小时</b><br><span style=\"color:#6b7280\">抓住<b>有效时间</b>，高效学习。10-15分钟的专注互动 > 2小时的敷衍陪伴。</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>2. 固定时间完成输入输出循环</b><br><span style=\"color:#6b7280\">建议<b>固定时间段</b>做英语启蒙，形成习惯。<br><b>「要事先做」</b>——把英语启蒙排在前面，而不是等有空再做。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>3. 一周2小时跟老师不能压缩</b><br><span style=\"color:#6b7280\">一周与老师的2小时是核心，不能压缩。<br>家里多花时间<b>高效学习</b>（碎片时间+固定时间结合）。</span></div>","tip":"你家宝宝17个月，现在是时间最充裕的阶段！趁还没上学，每天10-15分钟高效互动就足够。养成固定时间的习惯，比一次性学很久更有效。","category":"methods","tags":["没时间","时间管理","固定时间","高效学习","提早启蒙"],"date":"2026-07-02"},{"question":"启蒙路上如何坚持？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 核心原则：坚持的过程不能断</b><br>一旦断掉，就会一直找借口，逐渐停止。习惯断了比养成更难。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📌 四个坚持要点</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b style=\"color:#16a34a\">✅ 1. 不能断</b><br><span style=\"color:#6b7280\">哪怕每天只做5分钟，也比一周做一次2小时好。断一天→两天→一周→一个月，很容易就停了。<br>关键是<b>保持惯性</b>，不需要每天都是完美的学习，但每天都要有。</span></div><div style=\"padding:0.3rem 0 0.3rem 1rem\"><b style=\"color:#16a34a\">✅ 2. 劳逸结合，规律生活</b><br><span style=\"color:#6b7280\">不是过节放假就不用学习了。<br>规律的生活本身就是坚持的基础。把英语启蒙融入日常节奏，就像吃饭睡觉一样自然，不需要额外\"毅力\"。</span></div><div style=\"padding:0.3rem 0 0.3rem 1rem\"><b style=\"color:#16a34a\">✅ 3. 计划要符合实际，可长期发展</b><br><span style=\"color:#6b7280\">不要定太高的目标（比如每天2小时）→ 做不到就放弃。<br>定一个<b>轻松能完成</b>的底线计划，长期坚持才是赢。<br>建议：每天10-15分钟，这是可以持续好几年的节奏。</span></div><div style=\"padding:0.3rem 0 0.6rem 1rem\"><b style=\"color:#16a34a\">✅ 4. 「要事先做」原则</b><br><span style=\"color:#6b7280\">把英语启蒙排在每天待办事项的<b>前面</b>，而不是等所有事情做完再做。<br>先完成 → 心理负担解除 → 一整天轻松。</span></div>","tip":"你现在17个月就开始了，这是最大的优势。定一个每天10-15分钟的底线计划，雷打不动，不需要每次都完美。坚持到宝宝3岁，你会看到惊喜的！","category":"methods","tags":["坚持","劳逸结合","规律生活","要事先做","习惯"],"date":"2026-07-02"},{"question":"计划怎么定？视频看几遍？一遍几分钟？","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🧠 底层逻辑：学习过程 = 少量多次重复，螺旋上升</b><br>输入输出循环，每天都要进行。不是一次学很多，而是每天学一点但天天不断。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>👶 小宝宝的特点</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">注意力时间非常短，但<b>随时都在学习</b>。不需要正式的\"上课时间\"，日常生活中随时跟他说点什么，他都在吸收。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📋 学习计划核心：少量多次，大量重复</b><br>根据孩子的注意力，建立高效学习模式（Focus + Diffuse结合）</div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>📐 计划范例1：卡片学习</b><br><span style=\"color:#6b7280\">一周 <b>5张卡片</b>，每天只学一个主题（如颜色），做各种展开。<br>第二天：复习 + 引入新主题。<br>一周反复重复这5张卡片。</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>📐 计划范例2：视频学习</b><br><span style=\"color:#6b7280\">每天只看1个视频看5天会烦？→ 在注意力有限时间内<b>看5集</b>，第二天再看这5集，结合引导输出玩游戏加强句型。<br>每天吸收的加强内容都不一样，反复出现一周就能掌握很多。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>📐 计划范例3：大孩子阅读</b><br><span style=\"color:#6b7280\">要泛读，但每周都要有<b>精读</b>。精读+泛读结合。</span></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee;background:#f0fdf4;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>⭐ 好计划的标准：</b><br>✅ 要丰满有效<br>✅ 要重复<br>✅ 要有新东西刺激<br>→ 重复中带新意，新意中巩固旧知 = 螺旋上升</div>","tip":"你家宝宝17个月，试试一周5张卡片计划：每天花10分钟围绕一张卡做各种互动，第二天复习旧卡+引入新卡，一周下来5张卡滚瓜烂熟！","category":"methods","tags":["学习计划","少量多次","大量重复","螺旋上升","Focus","Diffuse","精读","泛读"],"date":"2026-07-02"},{"question":"一鸡娃娃就跑，咋办？如何调动孩子的积极性？","answer":"<div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>⚠️ 这节相当于教师培训</b><br>自己做引导人，这个视频至少看<b>10遍以上</b>！<br>想要调动孩子，自己需要具备相应的能力。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🧠 最重要的是心态：<b>观察者心态</b></b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">做<b>观察者</b>而不是<b>统治者</b>。<br>观察自己的孩子：注意力有多长时间？<br>→ 在他注意力集中的时候给他讲<br>→ 在他关注的事情上给他讲</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🗣️ 家长自身英语能力</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">捕捉到孩子注意集中的时间和事情，家长能不能<b>利用好、表达出来</b>？<br>没有及时跟上孩子在做的事情，效果大打折扣。</div><div style=\"padding:0.6rem 0;background:#f0fdf4;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>💡 经典案例</b><br>给孩子讲卡片，他不感兴趣，反而把妈妈打印的资料揉成团。<br><br><b style=\"color:#dc2626\">❌ 普通家长：生气、批评、强行拉回</b><br><b style=\"color:#16a34a\">✅ Susan老师：You made a ball! You made some noise. Awesome!</b><br><br>→ 就他揉纸团的动作进行英文描述，孩子反而更感兴趣！</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📢 语调的秘诀：注重 Flow（变化和表现）</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">你以为够激情了，<b>还不够</b>！看Susan老师怎么做的。<br>关键信息强调：<b>重音 + 语速放慢 + 单词拉长 + 表情 + 动作</b><br>综合性调动。看Susan视频时除了学内容，更要关注她的<b>表达方式</b>。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💪 其他要求</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">• <b>背景知识</b>要够（知道怎么扩展、怎么引导）<br>• <b>体力</b>要够（跟着孩子蹦蹦跳跳、做动作）<br>• 3岁以上有一定基础后，直接看Susan视频可能比妈妈教效果更好，妈妈配合即可</div>","tip":"观察者心态是核心！别想着\"我要教他\"，而是\"他在玩什么，我怎么用英语描述他正在做的事\"。揉纸团→You made a ball！这就是最好的英语启蒙。","category":"methods","tags":["观察者心态","积极性","鸡娃","语调","Flow","引导人","教师培训"],"date":"2026-07-02"},{"question":"孩子抵触，要不要停一段？","answer":"<div style=\"padding:0.6rem 0;background:#fef2f2;border-radius:10px;padding:10px 14px;border-left:4px solid #ef4444;font-size:0.85rem\"><b>🚫 不能停！一旦开始就不能停！</b><br>停了前面的全都白做。习惯断了比养成更难，一旦停下来，再启动需要花数倍的力气。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>✅ 正确做法：降级</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">孩子抵触 = 当前难度超出了孩子的能力范围。<br><br><b>适当降级非常重要</b>：<br>• 降输入难度：回到孩子能轻松接受的水平<br>• 降输出要求：暂时不要求孩子说，只听<br>• 降时间长度：从每天10分钟降到5分钟甚至2分钟<br>• 降素材复杂度：换回更简单的内容<br><br>→ 在降级后的水平上重新建立信心和兴趣，再缓慢回升。<br>→ 降级不是退步，是保护孩子的学习热情。</div>","tip":"如果宝宝抵触某个卡片或游戏，不要强求。换个更简单的方式，或者过两天再试。保持每天2-3分钟的最低底线，不断不断不断！","category":"methods","tags":["抵触","降级","不能停","坚持","降难度"],"date":"2026-07-02"},{"question":"我说英文，孩子总答中文，怎么破？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 原因：超过了已知区域</b><br>孩子用中文回答 = 你说的英文超出了他能理解/输出的范围，他只能用中文来回。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>✅ 解决方法：降低难度！</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>1. 从简单句开始</b><br><span style=\"color:#6b7280\">回到孩子能听懂的简单句子，不要急于说复杂的长句。</span></div><div style=\"padding:0.3rem 0 0.3rem 1rem\"><b>2. 英英教学</b><br><span style=\"color:#6b7280\">全程用英文，不用中文翻译。用动作、表情、实物帮助孩子理解。让英语和事物直接对应。</span></div><div style=\"padding:0.3rem 0 0.3rem 1rem\"><b>3. 基础扎实，逐步提高</b><br><span style=\"color:#6b7280\">在当前水平上反复练习，直到孩子能用英文回应，再慢慢加难度。<br>每次只升一个小台阶，不要跳级。</span></div><div style=\"padding:0.3rem 0 0.6rem 1rem\"><b>4. 不要纠正孩子的中文回答</b><br><span style=\"color:#6b7280\">不要说\"Say it in English!\"。<br>而是自己继续用英文回应，用正确的英文重复一遍，慢慢引导。</span></div>","tip":"17个月的宝宝用中文回应完全正常，这个阶段本来就是大量输入期，还不到要求输出的阶段。妈妈坚持说英文就好，宝宝会慢慢内化的！","category":"methods","tags":["中英混杂","中文回答","降难度","英英教学","已知区域"],"date":"2026-07-02"},{"question":"英文动画怎么看？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 鼓励看！正常语速、有情节，对正音和语感都有好处</b></div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;border-left:4px solid #f59e0b;font-size:0.85rem\"><b>⚠️ 前提：要有一定的听说基础</b><br>没有基础之前不要看，否则等于盲听。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📋 按年龄段选择</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>👶 2-3岁：</b><br><span style=\"color:#6b7280\">选<b>智力水平</b>合适的动画片（内容简单、画面清晰、语速不过快）</span></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>🧒 3岁以上：</b><br><span style=\"color:#6b7280\">要<b>同时考虑</b>智力水平和语言水平。<br>内容不能太幼稚（无聊不爱看），语言不能太难（看不懂没效果）。</span></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>⏰ 限制时间</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">每次看的时间要控制，保护视力和注意力。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🎭 不止于「看」——引导输出</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">看完动画后：<br>• <b>表演</b>：和孩子一起模仿动画片里的场景和对话<br>• <b>讲故事</b>：用英文复述看过的情节<br>→ 看是输入，演和讲是输出，形成完整的输入输出循环</div>","tip":"你家宝宝17个月，先打好听说基础，等接近2岁有一定词汇量后再引入简单的英文动画。到时候先从每集2-3分钟的短动画开始，看完一起表演！","category":"methods","tags":["英文动画","动画片","正音","引导输出","表演","讲故事"],"date":"2026-07-02"},{"question":"要不要让孩子背课文？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 看自己的需求和孩子的情况</b><br>不要一刀切，不同年龄段不同策略。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>👶 小小孩（Susan体系从小启蒙）</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">看视频、动画片、操作多了，<b>自己就跃跃欲试想要说</b>。<br>吸纳足够多 → 自然想表达 → 说出来就是一样的。<br><br><b style=\"color:#dc2626\">❌ 不要说「宝宝，过来背一遍」</b><br><b style=\"color:#16a34a\">✅ 应该配合他表演出来、鼓励他</b><br>逐渐会有自己的发挥，从模仿到创造。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🧒 大孩子刚启蒙</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">老师让背的东西<b>有必要的</b>，但不是背诵很多美文英语就能好。<br>背诵只是手段之一，不是全部。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📚 小学阶段（有基础的话）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><b>6岁以下：</b><br><span style=\"color:#6b7280\">逻辑还不足以完成复述，<b>表演</b>即可（动画片台词、角色扮演）<br>在大人帮助下把一集情节连贯起来已经很好了。</span></div><div style=\"padding:0.4rem 0 0.6rem 1rem\"><b>6岁以上：</b><br><span style=\"color:#6b7280\"><b>复述 + Presentation</b><br>• 做整段的复述<br>• 做演讲<br>• 再往后：每周一个 project，做一个 presentation<br>→ 从表演到复述到演讲，输出能力层层递进</span></div>","tip":"你家宝宝17个月，离背诵还远得很。现在就是大量输入，等他自己想说了配合他表演就好。千万不要要求孩子\"背\"，表演和玩才是正确的输出方式！","category":"methods","tags":["背诵","表演","复述","Presentation","演讲","输出方式"],"date":"2026-07-02"},{"question":"要教孩子语法吗？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 语法帮助提高语言质量</b><br>从理解到用对，还差1万个句子。语法更重要的在于<b>应用</b>，不是死记硬背规则。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>👶 3-5岁：不用解释语法</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">孩子听不懂语法术语，解释了也没用。<br>做法很简单：孩子说错了，<b>说一遍正确的句子</b>就可以。<br>不需要解释为什么，孩子会在大量正确的输入中自然习得语法。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📚 上小学之后：系统学习语法</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">建议跟一套<b>二语习得的系统语法教材</b>。<br>在<b>已知区域 +1</b>的基础上引导输出。<br>→ 孩子已经有大量听说积累，学语法就是把\"已经会用的\"变成\"用得更准确的\"。</div>","tip":"你家宝宝17个月，语法完全不用操心。妈妈自己说正确的句子就行，错误的语法不用解释，重复正确的就够。等上小学再系统学语法。","category":"methods","tags":["语法","二语习得","3-5岁","小学","语法教材","语言质量"],"date":"2026-07-02"},{"question":"家长的3个不合理要求是什么？","answer":"<div style=\"padding:0.6rem 0\"><b>🎯 这些要求看似合理，实则会给孩子巨大压力</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>❌ 不合理要求1：要求孩子张嘴就得说对</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">想想我们自己说母语的时候，孩子学中文也会说错（\"我吃饭在\"），我们不会纠正，反而觉得可爱。<br>英语也一样：<b>说错很正常，肯开口、多说才能说对。</b><br>不要在孩子每次开口时都纠错，会打击积极性。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>❌ 不合理要求2：要求学了半年一年后就能自由交流</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">对自由交流的概念有<b>误解</b>。<br><br><b>自由交流需要的条件：</b><br>• 主动词汇量约 <b>3000+</b><br>• 各方面的能力（听力、口语、语法、语用等）<br>• 即使高效学习也需要 <b>3-4年</b> 才能实现<br><br>要给孩子<b>足够的时间</b>。<br>关键：<b>在已知区域内引导输出</b>，孩子就能开口说。超出已知区域 = 逼着说 = 不说。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>❌ 不合理要求3：要求孩子读大量超出认知的材料</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">材料必须和<b>认知水平匹配</b>：<br>• <b>超出认知</b> → 不能理解，看不懂=浪费时间<br>• <b>低于认知</b> → 太简单无聊，不感兴趣<br>→ 选材要刚好在认知水平上或略高一点点（i+1）</div>","tip":"17个月宝宝的妈妈最容易犯的就是第一个——等宝宝开口说英语时，别急着纠正发音和语法。宝宝能开口就是胜利！慢慢来，说错了妈妈用正确的说法重复一遍就好。","category":"methods","tags":["不合理要求","张嘴就得说对","自由交流","超出认知","家长心态"],"date":"2026-07-02"},{"question":"到底什么叫学会了？","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🎯 学会了 = 会应用，有输出</b><br>不是「认识」「背过」「做对题」，而是能主动用来表达自己的想法。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🃏 闪卡怎样才算学会了？</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\"><b>最高级别：</b>拿到闪卡 → 能<b>解释 + 拓展</b> → 说出自己想表达的东西。<br><br>例如拿到 apple 卡：<br>• 初级：指认 → \"Apple!\"<br>• 中级：造句 → \"I like apples. They are red and sweet.\"<br>• 高级：拓展 → \"My favorite fruit is apple. I eat an apple every morning. Apples are good for you.\"<br><br>只有达到能围绕卡片<b>自由表达</b>，才算真正掌握。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📖 绘本怎么才算会了？</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\"><b>听说读都要</b>，但不止是朗读句子。<br>重点是<b>讨论和拓展</b>：<br>• 能复述故事大意<br>• 能回答关于绘本的提问<br>• 能发表自己的看法（喜欢哪个角色、为什么）<br>• 能把绘本内容和生活联系起来<br>→ 朗读句子 ≠ 学会了，能讨论拓展才算。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📚 高年级学生</b></div><div style=\"padding:0.4rem 0 0.6rem 1rem;color:#4b5563\">不能满足于做题。<br>要有<b>自己的思想观点</b>，并能用英语<b>表达出来</b>。<br>→ 从\"做对题\"到\"有想法并能说\"，这才是语言学习的终极目标。</div>","tip":"17个月宝宝还处在指认阶段，拿到卡片能指出来就是进步。别用高年级的标准要求宝宝，每个阶段有每个阶段的\"学会\"标准。现阶段：指认=学会！","category":"methods","tags":["学会了","会应用","有输出","闪卡标准","绘本文准","讨论拓展"],"date":"2026-07-02"},{"question":"输入输出循环原则——英语学习的本质","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🔄 输入→输出的循环</b><br>英语学习的本质是坚持输入到输出的循环。不是\"先输入够了再输出\"，而是\"输入的同时就要引导输出\"。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🎯 什么是有效的输入？</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px\">✅ <b>常速</b> — 现实生活语速，不刻意放慢</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px\">✅ <b>全英</b> — 无字幕，纯英语环境</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px\">✅ <b>带画面</b> — 画面提供语境，帮助理解意思</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>⚠️ 字幕的危害</b><br><span style=\"color:#ef4444\">字幕练的是<b>阅读</b>，不是听力。不要给孩子看带字幕的视频。</span></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 什么是可理解性输入？</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">明白意思的输入，不是盲听。常速语境视频是最好的资源，因为画面本身就是\"活字典\"。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🗣️ 积极引导输出</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">❌ \"听力先行论\"：等孩子自己开口 → 容易陷入沉默期<br>✅ <b>积极引导输出</b>：创造开口机会 → 3岁左右就能整句输出<br><br><i>积极引导输出避免沉默期、哑巴英语。</i><br><b>资源：</b>400集引导输出视频（Start with Susan系列）</div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>📌 核心要点</b><br>• 有效输入 = 常速 + 全英 + 带画面<br>• 可理解性输入 = 通过画面、动作、表情明白意思<br>• 字幕是阅读训练，不是听力训练<br>• 输入的同时就要引导输出，不等\"够了\"再说</div>","tip":"17个月的宝宝正处于高质量输入阶段。每天用常速全英儿歌、动画片做输入，同时简单引导（指物品问 What is this?），就是在做输入输出循环。","category":"methods","tags":["输入输出循环","有效输入","可理解性输入","引导输出","字幕"],"date":"2026-07-02"},{"question":"已知区域+1原则——最高效学习发生的位置","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🎯 已知区域+1 是最高效学习能够发生的位置</b><br>不是原地踏步（太简单），也不是跳到外面（太难），而是刚好比已知多一点点。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📐 英语学习的已知区域</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">英语的已知区域<b>不能从中文已知区域嫁接</b>。<br><br><b style=\"color:#8b5cf6\">听力已知区域 ➡️ 输出已知区域 ➡️ 阅读已知区域 ➡️ 写作已知区域</b><br>每一步建立在前一步的<b>真实内化</b>上，\"能用中文翻译出来\"不算会了。<br><br><b>已知区域+1 的状态：</b>稍加解释帮助就能理解驾驭。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>⚠️ 拼音文字的错觉</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><span style=\"color:#ef4444\">英语是拼音文字，能读出来 ≠ 能理解 ≠ 能运用。</span><br>很多人觉得\"这个单词我会读了\"就等于掌握了——这是最大错觉。<br><b>真正掌握的标准：能听懂、能表达。</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>⚠️ 放下虚荣，放下焦虑</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">容易被外界的虚荣迷惑，盲目刷难度。远超已知区域会导致低效学习甚至无法学习。<br><b>不要拿孩子当朋友圈的展品！</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>❓ 这条原则解释了什么？</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1. 分级为什么刷不动了？→ 超出已知区域+1了</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2. 孩子为什么没兴趣、抵触？→ 太难了，不是没天赋</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3. 孩子为什么停滞不前？→ 需要巩固已知区域，不是加难度</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">4. 国际幼儿园为什么效果好？→ 全天沉浸，始终在+1状态</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">5. 老外在中国多年学不会中文？→ 没有有效输入</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;font-size:0.85rem\">6. 能读但不会自由表达？→ 只有认读已知区域，输出区域是空的</div></div>","tip":"17个月的宝宝已知区域还很小，每一次正确的输入都是在扩建已知区域。不急不比，稳稳地+1就行。","category":"methods","tags":["已知区域+1","拼音文字错觉","内化","盲目刷难度","沉默期"],"date":"2026-07-02"},{"question":"观察者原则——家长的角色定位","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>👀 每个牛娃背后都有个合格的观察者和陪练者</b><br>家长不是\"老师\"，是<b>同学、伙伴、引导人</b>。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📋 预习 ≠ 照念台词</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">真正的预习要做到四步：</div><div style=\"padding:0.2rem 0 0.2rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ 这节课用了<b>哪些句型</b>？</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ 在<b>日常生活中</b>怎么用？</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3️⃣ 哪些单词可以套进这个句型？</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;font-size:0.85rem\">4️⃣ 卡片、游戏、道具都准备好了吗？</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 关键心态</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b>充分准备，但不强求结果。</b><br><i>即使你准备得再充分，孩子也可能完全不跟你走——这太正常了。</i><br><br>观察孩子，找到ta的兴奋点，抓住那个瞬间。兴奋点可能是一颗草莓、一只蚂蚁、一次洗澡，随时都会出现。<br><br>孩子坐不住是天性。加入🎬视频、🎨画画、🏃跑跳、🎵歌曲，调动五感。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>❓ 定位搞清楚，这些问题迎刃而解</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">Q: 孩子怎么不听我的？→ 你在\"教\"，不在\"玩\"，切换角色</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">Q: 要不要先背下来再教？→ 不用背台词，理解句型灵活运用到生活场景</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\">Q: 我说英文ta老答中文？→ 不焦虑不纠正，输出区域到了自然切换</div></div>","tip":"你是宝宝的伙伴不是老师。17个月宝宝坐不住很正常，跟着ta的节奏走，用游戏和夸张表演吸引注意力。","category":"methods","tags":["观察者原则","家长角色","预习","兴奋点","五感"],"date":"2026-07-02"},{"question":"实操三大步骤——指认对应、句型构建、常速语境","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📋 三大步骤总览</b><br>Susan把听说能力的获得分成三大步骤，每一步都是下一步的基础。</div><div style=\"padding:0.4rem 0;background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">🧱 <b>第一步：指认对应引入</b> — 单词bricks（家长参与最多）</div><div style=\"padding:0.4rem 0;background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">🏗️ <b>第二步：基础句型构建</b> — 句型框架（80%交给视频）</div><div style=\"padding:0.4rem 0;background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\">🏢 <b>第三步：常速语境提升</b> — 自由表达（省6位数学费）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🧱 第一步：指认对应引入</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b>0基础一定要先做指认对应</b>，先不要看视频。\"女孩是girl\"这种借助中文的也算0基础。<br><br><b>这个阶段的目标：说出单词就是胜利，不要求说句子。</b><br><br><b>四要四不要：</b><br>✅ 要high起来，不要正襟危坐<br>✅ 要尽量全英，不要中英混杂<br>✅ 要鼓励（good job! high five!），不要逼孩子<br>✅ 要坚持，不要放弃<br><br><b>引入新内容的游戏：</b>拍打单词卡（位置/音量/速度变化）、动起来（藏背后/跳起来头顶卡）、比赛跑单词卡（让孩子赢）、扔骰子<br><br><b>复习游戏：</b>锤子游戏（听词击打，可升级where is/猜词）、What is Missing?（闭眼藏一张）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🏗️ 第二步：基础句型构建</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">做好指认后，<b>妈妈们至少被解放了80%</b>，看Susan千集视频即可。<br><br><b>核心资源：</b>Start with Susan（开口神器）400集引导输出视频<br><b>学完20集就可以开始句型构建</b>，和指认同时进行。<br><br><b>句型构建四注意：</b><br>✅ <b>重视</b> — 练到熟练运用，单词卡反复练习<br>✅ <b>用够</b> — 1-2个句型练1周，不能跟读完就过了<br>✅ <b>有趣</b> — 引入比赛，让孩子上瘾<br>✅ <b>联系生活</b> — 出门也要用<br><br><i>英语水平的高度，由基础句型的熟练程度决定。</i></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🏢 第三步：常速语境提升</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b>本质：Presentation演讲训练。</b>以一个词为锚点，扩展词汇和句型，锻炼表达逻辑。<br><br><b>小学前的做法：</b>孩子做不到完整presentation → 家长提问引导，做思维导图<br><b>学会的标准：</b>孩子能否自己讲出来<br><br><b>六大注意点：</b><br>✅ 反复看，一周3-5集少量多次<br>✅ 一起看，加入互动讨论<br>✅ 不打断不直译，建立英文通路<br>✅ 不背逐字稿，自然融入<br>✅ 帮孩子整理思路，不逼立刻复述<br>✅ 小宝宝问答引导<br><br><i>吃三个馒头才能饱，别奢望只吃第三个就饱。前两个是基础！</i></div><div style=\"padding:0.6rem 0;background:#fef2f2;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>⚠️ 常见误区</b><br>• 不要一直停留在指认阶段不推进<br>• 不要跳过句型构建直接看常速语境<br>• 不要用字幕版视频（那是练阅读不是练听力）</div>","tip":"17个月的宝宝正在第一步：指认对应引入。一次1-2个单词，游戏化，全英，high起来。说出单词就是胜利！","category":"methods","tags":["三大步骤","指认对应","句型构建","常速语境","Start with Susan","Presentation"],"date":"2026-07-02"},{"question":"七大系统训练——听说基础的训练方法","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🏋️ 材料不重要，训练方法最重要</b><br>七大训练适合中国孩子做听说基础，贯穿学习始终。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>1️⃣ 音素意识训练</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">指认阶段就可以渗透。不是系统学自然拼读，而是建立\"发音→字母\"的初步感知。<br>• 同首字母单词卡放一起练习<br>• 元音发音要发准，不要误导孩子<br>• 偶尔故意发错，提高兴趣<br>• 渗透到日常学习，不要单独拿出来训练</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>2️⃣ 猜词训练（听力+词汇横向扩展最高效）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b>正向猜词</b>（妈妈描述孩子猜）：描述要生动，强调关键词+肢体+音调；教孩子抓关键词；<span style=\"color:#ef4444\">昨天引入的卡今天就猜是不对的</span>；猜词即拓展<br><br><b>反向猜词</b>（孩子描述妈妈猜）：很后面的阶段再用；孩子表达困难时主动给问题、例子；用错误答案引导更多表达</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>3️⃣ TPR训练（全身反应法）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b>有了动词才有句子。一个动词就是一个句子。</b><br>动词不需要解释，直接用身体表演。引导人的夸张表演提高兴趣。复习动词也用表演。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>4️⃣ 随机组句训练 ⭐</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><span style=\"color:#8b5cf6\"><b>绝大多数孩子的问题都是简单的不会，而不是难的不会。</b></span><br><br><b>做法：</b>一打名词卡+一打动词卡，随机各抽一张，说整句。<br>• 名词+动词 = 整句：<i>What is the car doing? It is eating!</i><br>• 名词+动词+名词 = 主谓宾<br><br><b>三大目标：</b>引导说整句、熟悉英语语序（内化语法）、从主谓到主谓宾逐步扩展<br><br><i>把基本句型做扎实，你会神奇地发现孩子突破了瓶颈。</i></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>5️⃣ 单项复述训练 ⭐</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">考察一张闪卡学到位没有 = 让孩子<b>自己讲一遍</b>（讲，不是读不是背）。<br><br><b>4岁以下：</b>家长提问式引导+做思维导图（训练英文+逻辑）<br><b>4岁以上：</b>独立做presentation<br><br><b>注意：</b>在充分熟悉单词卡各种内容的基础上进行；闪卡做1.5-2年到达能讲的程度就是成功</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>6️⃣ 创意故事训练 🔥（终极训练）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><span style=\"color:#ef4444\"><b>能做到这一步的孩子可以在任意一所名牌小学为所欲为！</b></span><br><br>一摞随机卡，一张一张编故事串联。孩子喜欢不确定性。考虑角色、背景、情景。孩子和家长一人一句。<br><br><b>前提：</b>单项复述666后。调动全部能力：语言点×词汇×句型×时态×想象力</div><div style=\"padding:0.6rem 0;background:#f0fdf4;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>📌 进阶路线</b><br>音素意识 ↗ 猜词训练 ↗ 随机组句 ↗ 单项复述 ↗ 创意故事<br>TPR贯穿动词学习始终</div>","tip":"17个月宝宝现在可以做TPR训练！动词直接演（jump/clap/run），音素意识可以在指认阶段开始渗透。猜词和随机组句等指认积累够了再做。","category":"methods","tags":["七大训练","音素意识","猜词","TPR","随机组句","复述","创意故事"],"date":"2026-07-02"},{"question":"大合唱编排——七大训练的时间线和节奏","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>🎵 英语输出像大合唱</b><br>几个声部一起演唱才能形成美妙的曲子，只有一个声部是没有效果的。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部1：单词指认（起步）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">• 参考资源：亲子教案、初学者攻略、Susan手把手（公号）<br>• <b>1岁多宝宝：量不要大，一次1-2个单词</b>，或5个单词重复5天<br>• 注意力在就做，不在就不做，进度一定要慢</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部2：随机组句（尽快引入）⭐核心声部</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><span style=\"color:#ef4444\"><b>不要一直停留在指认单词！</b></span>指认过的旧单词就可以开始随机组句。<br><br><b>核心目标：</b>用3-5年做到张嘴能把引导输出ABCD的语法90%用对，大量输出。<br><br><b>阶段性目标：</b><br>• 半年到一年半：引导输出A+B的一半做完，能用小短句说一整天<br>• 做一段时间后加入低阶绘本+讨论<br>• <b>随机组句+Zoom in+低阶绘本讨论 = 0-1阶段三巨头，占每周80%</b></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部3：正反向猜词（句型A完成后）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">引导输出A的句型完成后就可以加，体现了随机组句的成果。5岁前以猜词游戏形式进行。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部4：复述（猜词差不多后）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">开始前先学画思维导图（公号有合集）。前3年只占20%，一周做1个复述即可。<br><br><b>由易到难：</b>单图复述 → 低阶绘本复述(5-6张图) → 牛津树复述 → RAZ科普复述 → 动画复述</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部5：Presentation（小学3-4年级+）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">与复述区别：自己选主题，结合动画和查到的资料，形成自己的主题输出。一直到高中都能做。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部6：编故事（能用过去式后）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">名词卡动词卡混放，引入新词，自由编故事。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📝 声部7：写作（最晚加入）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">前置条件：RAZ中高阶 + 自然拼读非常熟练 + 写字不费劲</div><div style=\"padding:0.6rem 0;background:#fef3c7;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>📊 每周内容包占比</b><br><b>0-1阶段（约3年）：</b>随机组句+Zoom in+低阶绘本讨论 80% + 复述 20%<br><b>写作后：</b>去掉指认和随机组句，跟着内容包做泛听+视频+阅读+复述+写作</div>","tip":"17个月宝宝只需要做声部1：单词指认。一次1-2个单词，游戏化，注意力在就做不在就停。声部2等指认积累够了自然引入。","category":"methods","tags":["大合唱","时间线","声部编排","随机组句","复述","Presentation"],"date":"2026-07-02"},{"question":"内容包——每周计划怎么做","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📦 以周为单位，完成输入→输出的循环</b><br>内容包包括动画片、故事、绘本共读、输入输出游戏、随机组句、章节书+复述，齐头并进，不是一次只干一个。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>👶 不同年龄的内容范围</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\"><b>2-3岁：</b>听 + 说</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\"><b>0-3岁：</b>能把英文和实物对应上就很好，<b>不必须开口</b></div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\"><b>小学前：</b>听 + 说 + 读</div><div style=\"background:#ede9fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>小学后：</b>听 + 说 + 读 + 写</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🎧 听（输入）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">• 0-1阶段：看已知区域内的动画片、TED Talk、美剧等<br>• 0-1完成后：可以上纯音频泛听</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>🗣️ 说（输出）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">• 0-3岁：能对应上就很好，不必须开口<br>• 0基础：随机组句+Zoom in+绘本讨论<br>• 上拼读后：指认+听写拆散到每周每天<br>• 持续：复述</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📖 读</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">拼读阶段：自然拼读 → 拼读后：独立阅读</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>✍️ 写</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">写作阶段：每周写一篇</div><div style=\"padding:0.6rem 0;background:#f0fdf4;border-radius:10px;padding:10px 14px;font-size:0.85rem\"><b>📋 周计划要点</b><br>• 拆分打散到一周每天，<b>不一定每天所有内容都做</b><br>• 一周内完成内容包任务即可<br>• 随机组句+Zoom in+低阶绘本讨论占每周80%（约3年）<br>• 跟着孩子状态走，注意力在就做不在就停</div>","tip":"17个月宝宝的每周内容包很简单：看已知区域内的动画片+指认1-2个单词+游戏化互动。能把英文和实物对应上就很好，不要求开口。","category":"methods","tags":["内容包","周计划","听说读写","泛听","独立阅读"],"date":"2026-07-02"},{"question":"2026.05.31 — 里程碑：麦当劳主动和外国人互动 + 折卡片说No","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📝 观察记录</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b>事件1：麦当劳主动和外国游客社交</b><br>白天在麦当劳，Cora主动靠近一桌外国游客，在她们面前晃了好几圈，冲她们微笑眨眼睛。外国游客也逗她，完成了<b>Hello和击掌</b>互动。她们走的时候还专门过来和Cora道别。<br><br><b>事件2：折卡片 + 说No</b><br>看见妈妈把小时候的黑白闪卡折了一个角当扇子用后，Cora每次都要折卡片，折完还要说 <b>\"no no no no no\"</b>。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📊 分析评估</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>1. 社交英语输出萌芽</b><br>在16个月就能主动完成 Hello + 击掌 的英文社交互动，说明Cora对英语的接受度非常高。她不是把英语当\"学习\"，而是当\"交流\"——这正是Susan方法追求的目标。她能分辨出外国游客并用英语方式互动，说明已经建立了\"英语环境→英语回应\"的直觉。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>2. \"No no no no no\" — 重要的多音节输出</b><br>这不是简单的模仿，而是<b>有场景意义的语言输出</b>：折卡片→觉得不对→说no。这说明Cora已经理解了\"no\"的含义（否定/不对/不好），并且能在特定场景主动调用。连续5个no体现节奏感和表达欲望。</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>3. 折卡片 — 观察者原则的生动体现</b><br>Cora观察妈妈的行为并立刻模仿，正是\"观察者原则\"的正面案例。她不是在被动接收指令，而是主动观察→模仿→创造自己的玩法。家长是孩子最好的示范者。</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 下一步建议</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ <b>乘胜追击Hello/Bye-bye/High-five</b><br>Cora已经能完成Hello+击掌，说明社交类英语是她的兴奋点。接下来可以有意识地在日常中扩展：<b>Bye-bye、Thank you、Good morning</b>等社交短句。每天出门、吃饭、睡觉都用这些词，自然内化。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ <b>利用\"折卡片\"建立游戏</b><br>把折卡片变成TPR游戏：妈妈折卡片说\"No no no!\"，Cora跟着折。然后展开卡片说\"Yes yes yes!\"。在欢笑中强化no/yes这对反义词，同时锻炼手指动作。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3️⃣ <b>继续创造英语社交机会</b><br>如果有机会，多带Cora去有外国人的场景（公园、商场）。不用刻意安排，只要她在场，这种自然的英语社交互动就是最好的\"常速语境输入+引导输出\"组合。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\">4️⃣ <b>里程碑定位</b><br>当前阶段：<b>指认对应 + 早期社交输出萌芽</b>。Cora的已知区域正在稳步扩张，社交互动类表达可能是她最先突破的输出领域。</div></div>","tip":"16个月的Cora已经能主动完成英文社交互动（Hello+击掌），这是非常积极的信号！社交类英语是她的兴奋点，可以重点扩展。","category":"growth","tags":["社交输出","Hello","No","TPR","模仿","16个月","里程碑"],"date":"2026-05-31"},{"question":"2026.06.03 — 里程碑：认识了第4个字母S（已知B/Y/U/S）","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📝 观察记录</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">继B、Y、U之后，Cora认识了第4个字母 <b style=\"font-size:1.2em;color:#8b5cf6\">S</b>。<br>目前已认识的字母：<b style=\"font-size:1.1em\">B — Y — U — S</b>（共4个）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📊 分析评估</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>1. 字母认知进度正常</b><br>16个月开始逐步认识字母，完全符合\"已知区域+1\"原则。Cora不是被\"教\"的，而是在自然接触中逐渐吸收的。每个字母都是在已有基础上+1，稳扎稳打。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>2. 与前面里程碑的关联</b><br>从5月31日的\"麦当劳社交互动+说No\"到6月3日的\"认识字母S\"，只隔了3天。Cora的英语输入正在加速积累，已知区域在稳步扩张。字母认知和单词指认可以同步推进——Susan的音素意识训练就是在指认阶段渗透的。</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>3. 字母选择很有趣</b><br>B、Y、U、S——这几个字母恰好能拼出一些简单的高频词前缀（如 <i>by, us</i>）。Cora选择认识的字母并非随机，可能跟她日常接触的单词有关（比如看到过的S开头的单词：sun, star, Susan等）。</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 下一步建议</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ <b>字母关联单词游戏</b><br>把已认识的4个字母跟单词卡片关联起来：<b>B</b>→banana/ball/bear, <b>S</b>→sun/star/snake, <b>U</b>→umbrella/up, <b>Y</b>→yellow/yawn。用拍打游戏巩固字母和单词的对应关系。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ <b>音素意识渗透</b><br>Susan的七大训练中，音素意识可以在指认阶段就开始渗透。Cora已经认识4个字母，可以把同首字母的单词卡放一起，建立\"发音→字母\"的初步感知。比如B开头的单词一组，S开头的一组。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3️⃣ <b>不强求更多字母</b><br>记住\"已知区域+1\"——不要因为别的孩子认识26个字母就去催Cora。4个字母很好，下一个等她自然接触中出现再引导即可。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\">4️⃣ <b>里程碑定位</b><br>当前阶段：<b>指认对应 + 字母认知萌芽 + 社交输出萌芽</b>。多条线在并行发展，Cora的英语启蒙进展稳健。</div></div>","tip":"Cora已认识4个字母（B/Y/U/S），可以在指认中自然渗透音素意识——同首字母单词放一组，建立发音和字母的关联。","category":"growth","tags":["字母认知","S","音素意识","16个月","里程碑","已知区域"],"date":"2026-06-03"},{"question":"2026.06.07 — 里程碑：翻DK书自发说出milk和coffee","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📝 观察记录</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">和爸爸一起玩，Cora自己拿着《DK 1000 Useful Words》这本书，<b style=\"color:#8b5cf6;font-size:1.05em\">自发说出了 milk 和 coffee</b>。妈妈非常意外。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📊 分析评估</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>1. 自发输出 — 从\"被动接收\"到\"主动调用\"的关键跃迁</b><br>milk和coffee不是妈妈\"教\"的，也不是跟读的，而是Cora<b>自己在翻书时主动说出来的</b>。这说明这两个词已经从\"听懂的词\"变成了\"能调用的词\"——真正进入了她的<b>输出已知区域</b>。这是输入→输出循环的标志性时刻。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>2. coffee — 超出预期的输出</b><br>coffee是两个音节的词（/ˈkɒfi/），对于16个多月的宝宝来说相当不简单。大多数同龄宝宝能自发的还是单音节词（如ball、dog、car）。Cora能说出coffee，说明她的<b>听觉分辨和口腔控制</b>发展得很好，也说明这个词在她的日常环境中足够高频（可能爸爸经常喝咖啡，她早就建立起了\"实物→英文\"的对应）。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>3. 和爸爸一起玩时输出 — 多语言输入环境正在起效</b><br>milk和coffee是在和爸爸互动时说出来的，说明Cora的英语输入不限于妈妈一个人——<b>家庭的整体英语环境正在发挥作用</b>。爸爸的参与让Cora的英语使用场景更丰富、更自然。</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>4. DK 1000 Useful Words — 被动吸收正在转化</b><br>之前一直说的\"可理解性输入\"在这里得到了验证：Cora并不是在看这本书时才\"学会\"milk和coffee的，而是通过日常生活中的反复接触（喝牛奶、看爸爸喝咖啡）早已建立了对应关系。翻到DK书中的图片时，只是激活了她已有的英文通路。</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 下一步建议</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ <b>围绕milk和coffee做扩展</b><br>milk可以扩展：Do you want milk? Here is your milk. Yummy milk!<br>coffee可以扩展：Daddy is drinking coffee. Hot coffee!（配合夸张表情）<br>把这两个词放进简单句里，从\"说单词\"逐步过渡到\"听短句\"。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ <b>DK书变成探索工具</b><br>既然Cora对DK书有兴趣，可以让她翻着玩，不刻意引导。看到她停在某页停留时，用整句描述：Oh, you found the fruit page! Look, a banana! 让她自己翻，你在旁边观察和补充。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3️⃣ <b>鼓励爸爸参与更多</b><br>爸爸的参与正在产生效果！建议爸爸每天固定一个场景用英语（比如早上喝咖啡时、出门前），形成稳定的英语输入源。越多人在Cora面前说英语，她的输出动力越强。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\">4️⃣ <b>里程碑定位</b><br>当前阶段：<b>指认对应 + 字母认知 + 社交输出 + 自发单词输出萌芽</b>。<br>Cora的输出已知区域正在悄然扩大：hello、no、milk、coffee——都是从日常输入中自然冒出的。这比刻意教的更牢固、更真实。</div></div>","tip":"Cora自发说出了milk和coffee！这不是跟读，是她真正会了的词。从被动吸收到主动调用的关键跃迁。","category":"growth","tags":["自发输出","milk","coffee","DK书","爸爸参与","已知区域","里程碑"],"date":"2026-06-07"},{"question":"2026.06.12 — 综合进度：26个自发输出单词 + 13组TPR指令","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📝 观察记录（2026.06.12 综合进度）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b style=\"color:#8b5cf6\">一、能自发输出的单词（26个）</b><br>看见卡片/实物/玩具，<b>第一反应</b>就能说出：<br><span style=\"background:#f0fdf4;padding:2px 6px;border-radius:4px;font-size:0.82rem\">cake · ball · bear · pig · cat · panda · hen · coconut · leg · hand · heart · bottom · head · hat · apple · lion · duck · moon · car · pencil · arm · baby · mommy · egg · dog</span><br><br><b style=\"color:#8b5cf6\">二、引导后能重复输出的单词</b><br>一般不能主动输出的单词，妈妈先念一遍，引导下也能重复。<br><br><b style=\"color:#8b5cf6\">三、能听懂并做出动作的指令（13组）</b><br><span style=\"background:#fef3c7;padding:2px 6px;border-radius:4px;font-size:0.82rem\">sit down please · come here · what is red? · wash your hands · clap your hands · touch your nose · smell · stomp your feet · turn around · hug · bye bye · high five</span></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📊 分析评估</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>1. 26个自发输出单词 — 进展超出预期</b><br>17个月的宝宝能有26个<b>自发输出</b>（不是跟读、不是引导）的英文单词，说明Cora的已知区域已经从\"点\"扩展成了\"面\"。按Susan的指认阶段标准，这个数量和质量都非常好。<br><br><b>分类统计：</b><br>• <b>身体部位6个</b>：leg, hand, heart, bottom, head, arm<br>• <b>动物8个</b>：bear, pig, cat, panda, hen, lion, duck, dog<br>• <b>食物4个</b>：cake, coconut, apple, egg<br>• <b>物品5个</b>：ball, car, pencil, hat, moon<br>• <b>人物2个</b>：baby, mommy<br><br>身体部位和动物占比最大，这完全符合指认阶段的特征——具象、可触摸、可以用动作演示的词汇最先内化。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>2. 引导后能重复 — 输出区域正在快速扩张</b><br>不能自发输出的单词，引导一下就能重复——这说明这些词已经在<b>听力已知区域</b>里了，只是还没进入<b>输出已知区域</b>。这是正常的过渡状态，随着重复和场景化使用，它们会逐渐转为自发输出。<br><br><i>按照这个趋势，26个自发词 + 引导词 = Cora的\"听力+输出总已知区域\"比表面看到的更大。</i></div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>3. 13组TPR指令 — 听力理解显著领先于口语输出</b><br>能听懂并执行13组指令，说明Cora的<b>听力已知区域远大于输出已知区域</b>，这完全符合语言习得的正常规律——听力先行，输出跟进。<br><br><b>亮点分析：</b><br>• <span style=\"color:#ef4444\">\"What is red?\"</span> — 这是一个<b>疑问句+颜色形容词</b>，不只是一般名词。说明Cora能理解更复杂的句子结构，不只是简单的\"做动作\"<br>• \"sit down please\" — 包含<b>礼貌用语please</b>，说明她能在语境中理解附加修饰<br>• \"turn around\" / \"stomp your feet\" — 来自SSS儿歌（Walking Walking等），验证了儿歌TPR的有效性<br>• \"bye bye\" / \"high five\" / \"hug\" — 社交类指令，与5月31日麦当劳互动一脉相承</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>4. 与前三次里程碑的关联</b><br>| 时间 | 里程碑 | 意义 |<br>| 5.31 | Hello+击掌+说No | 社交输出萌芽 |<br>| 6.03 | 认识第4个字母S | 字母认知萌芽 |<br>| 6.07 | 自发说milk/coffee | 首个自发非跟读输出 |<br>| 6.12 | 26个自发词+13组TPR | 已知区域从点→面 |<br><br>从5月31日到6月12日，仅12天，Cora的输出从\"偶尔冒出一两个词\"跃升到\"看见实物就能说26个词\"。这12天的爆发说明前期的输入积累到了<b>质变的临界点</b>。</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 下一步建议</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ <b>从\"说单词\"到\"说短句\"的过渡</b><br>26个自发词是坚实基础。现在可以开始用<b>引导输出A</b>的句型，把这些单词套进短句：<br>• This is a dog. → This is a pig.<br>• I see a ball. → I see a cat.<br>• What is this? → It is an apple.<br>不需要Cora立刻说完整句，妈妈说整句，让她在听的过程中自然吸收句型结构。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ <b>把\"引导后能重复\"的词推向自发输出</b><br>对于引导后才能重复的词，在日常场景中多创造出现机会：实物指认、卡片游戏、DK书翻阅。不需要额外教，<b>高频出现自然转化</b>。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3️⃣ <b>TPR指令继续扩展</b><br>Cora对TPR指令反应很好，可以继续加入新指令：<br>• \"Show me the ball\" / \"Where is the cat?\"（找东西）<br>• \"Give me a hug\" / \"Wave your hands\"（社交动作）<br>• SSS儿歌中的动词：jump, run, swim, sleep（运动类）<br>TPR做得越好，将来动词输出就越自然。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">4️⃣ <b>里程碑定位</b><br>当前阶段：<b>指认对应（中后期）+ TPR听力理解良好 + 自发单词输出爆发期</b><br>Cora正处于指认阶段最丰收的时期——输入积累开始密集转化为输出。这个势头非常棒！<br><br><b>已知区域评估：</b><br>• 输出已知区域：~26个单词（快速增长中）<br>• 听力已知区域：~26个自发词 + 引导词 + 13组TPR指令（远大于输出区域）<br>• 字母认知：B, Y, U, S（4个，稳步增长）<br>• 社交输出：Hello, bye bye, no, high five, hug</div></div>","tip":"26个自发输出单词！Cora的已知区域从点扩展到了面，正处于指认阶段最丰收的爆发期。听力已知区域远大于输出区域，这完全正常。","category":"growth","tags":["综合进度","自发输出","26个词","TPR","听力理解","已知区域","里程碑","指认阶段"],"date":"2026-06-12"},{"question":"2026.06.15 — 里程碑：完整重复coffee bean（双词词组）","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📝 观察记录</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\">妈妈拿了一粒咖啡豆给Cora，教她 <b style=\"color:#8b5cf6;font-size:1.05em\">\"coffee bean\"</b>，Cora竟然<b>完整重复</b>了出来。</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📊 分析评估</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>1. \"coffee bean\" — 从单词到词组的跃迁</b><br>6月7日Cora自发说出\"coffee\"，现在9天后她能完整重复\"coffee bean\"这个<b>两词词组</b>。这说明她不只是单个单词的积累，而是在建立<b>词汇组合的感知能力</b>。对于17个月的宝宝来说，从单字输出到双词输出是一个非常重要的阶段性跨越。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>2. 咖啡豆 — 实物加持的威力</b><br>这次学习完美体现了\"可理解性输入\"：妈妈拿了一粒真实的咖啡豆，Cora能摸到、看到、闻到。五感参与的输入效率远高于只看图片或卡片。<br><br><i>这就是Susan说的：五感记忆 > 单一视觉记忆。下次教新词时，尽量让Cora摸到、闻到、尝到。</i></div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>3. coffee线索的延续</b><br>从6月7日自发说coffee，到6月15日重复coffee bean，coffee这条线一直在自然延伸。爸爸喝咖啡的日常场景让这个词在Cora的已知区域内扎了根。在此基础上加\"bean\"只是+1，所以她能轻松接受。</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 下一步建议</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ <b>用已知词+新词 = 轻松扩展</b><br>Cora已经能说coffee，现在coffee bean就是自然扩展。同样的思路可以用来扩展其他词：<br>• apple → apple juice<br>• baby → baby bottle<br>• ball → red ball / big ball<br>用她已知的词搭桥，每次只+1个新元素。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ <b>实物教学常态化</b><br>咖啡豆的成功经验说明实物教学非常有效。日常生活中的食材、植物、日用品都可以用来做指认：拿一颗花生教peanut，拿一片树叶教leaf，拿一颗葡萄教grape。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\">3️⃣ <b>里程碑定位</b><br>当前阶段：<b>指认对应（中后期）+ 单词输出爆发期 + 双词词组萌芽</b><br>Cora正在从\"说单词\"向\"说词组\"过渡，这是英语输出的自然进阶。不需要刻意加速，保持日常输入，她会自己突破。</div></div>","tip":"从coffee到coffee bean，Cora正在从单词输出向词组输出过渡！用已知词搭桥+1新词是最有效的扩展方式。","category":"growth","tags":["双词词组","coffee bean","实物教学","已知区域+1","里程碑","五感"],"date":"2026-06-15"},{"question":"2026.07.02 — 进度更新：43个自发输出单词（新增17个）+ close your eyes","answer":"<div style=\"padding:0.6rem 0;background:#ede9fe;border-radius:10px;padding:10px 14px;border-left:4px solid #8b5cf6;font-size:0.85rem\"><b>📝 观察记录（2026.07.02 进度更新）</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem;color:#4b5563\"><b style=\"color:#8b5cf6\">一、新增自发输出单词（18个）</b><br>看到卡片/实物/玩具会说：<br><span style=\"background:#f0fdf4;padding:2px 6px;border-radius:4px;font-size:0.82rem\">deer · boy · girl · cap · carrot · chick · daddy · fish · <b>hamburger</b>（发成hamgurber） · monkey · orange · owl · pea · onions · sofa · tiger · oval · balloon</span><br><br><span style=\"background:#fef3c7;padding:2px 6px;border-radius:4px;font-size:0.82rem\">💡 发音趣事：hamburger 发成了 \"hamgurber\"，省略了中间的音节，这是幼儿英语发展中非常正常的发音简化现象。</span><br><br><b style=\"color:#8b5cf6\">二、新增TPR指令（3组）</b><br><span style=\"background:#e0f2fe;padding:2px 6px;border-radius:4px;font-size:0.82rem\">close your eyes</span><br><span style=\"background:#e0f2fe;padding:2px 6px;border-radius:4px;font-size:0.82rem\">Give me a hug</span>（主动做拥抱动作）<br><span style=\"background:#e0f2fe;padding:2px 6px;border-radius:4px;font-size:0.82rem\">Wave your hands</span>（主动挥手）</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>📊 分析评估</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>1. 自发输出总量：44个单词（26→44，20天新增18个）</b><br>从6月12日的26个到7月2日的43个，20天净增17个，增长速度保持在<b>每天接近1个新词</b>。这个节奏非常健康——不是突击填鸭式的增长，而是日常自然积累的稳步扩张。<br><br><b>全部分类统计（44个）：</b><br>• <b>动物13个</b>：bear, pig, cat, panda, hen, lion, duck, dog, deer, fish, monkey, owl, tiger<br>• <b>身体部位6个</b>：leg, hand, heart, bottom, head, arm<br>• <b>食物7个</b>：cake, coconut, apple, egg, carrot, pea, orange<br>• <b>物品9个</b>：ball, car, pencil, hat, cap, sofa, moon, oval, balloon<br>• <b>人物3个</b>：baby, mommy, daddy<br>• <b>其他7个</b>：chick, hamburger, onions, boy, girl, balloon, coffee+milk（此前记录）<br><br><b>动物从8个涨到13个</b>，是增长最快的类别。Cora明显对动物类词汇特别敏感，这和宝宝天生对动物感兴趣的认知特点完全吻合。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>2. \"hamgurber\" — 可爱的发音简化</b><br>Cora把hamburger说成hamgurber，省略了中间的\"b\"音节。这在语言学上叫<b>音节省略（syllable deletion）</b>，是幼儿语言发展的正常阶段。几乎所有学英语的宝宝都会经历：<br>• elephant → \"efant\"<br>• banana → \"nana\"<br>• hamburger → \"hamgurber\"<br><br><span style=\"color:#ef4444\"><b>重要：不要纠正她的发音！</b></span>她能主动说出这个三音节词已经很了不起了。正确的做法是妈妈用正确发音重复一遍（\"Yes! Hamburger!\"），让她自然听到正确的版本，随着口腔控制能力发展，发音会自己修正。</div><div style=\"background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.85rem\"><b>3. 新增词汇的亮点</b><br>• <b>oval（椭圆形）</b> — 这是一个<b>形状概念词</b>，属于抽象词汇。大多数同龄宝宝还在具象名词阶段，Cora已经开始接触形状类抽象词了，说明认知发展很好<br>• <b>onions（洋葱）</b> — <b>复数形式</b>！Cora说onions而不是onion，说明她记住了卡片上的原始形式。虽然她可能不理解单复数语法，但这种\"整体记忆\"正是自然习得的特征<br>• <b>daddy</b> — 终于出现了！之前只有mommy和baby，现在家庭成员词补齐了</div><div style=\"background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:0.85rem\"><b>4. 20天发展脉络</b><br>| 日期 | 里程碑 | 自发词量 |<br>| 05.31 | Hello+击掌+No | ~2-3个 |<br>| 06.07 | milk+coffee自发 | ~4个 |<br>| 06.12 | 首次系统盘点 | 26个 |<br>| 06.15 | coffee bean词组 | 26个+ |<br>| <b>07.02</b> | <b>第二轮盘点</b> | <b>44个</b> |<br><br>从0到43个自发输出单词，Cora用了约1个月。这个速度在Susan的指认阶段框架下属于<b>正常偏快</b>的进度，说明家庭的英语输入环境做得很好。</div></div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 下一步建议</b></div><div style=\"padding:0.4rem 0 0.4rem 1rem\"><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">1️⃣ <b>动物类词汇优势，重点利用</b><br>Cora对动物词特别敏感，13个动物词是最大类别。可以围绕动物做更多互动：<br>• 动物叫声游戏：What does the lion say? Roar!<br>• 动物动作TPR：The monkey jumps! The tiger runs!<br>• DK书动物页自由探索，让她翻到你旁边补充</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">2️⃣ <b>保持\"不纠正发音\"的原则</b><br>hamgurber就让它hamgurber，efant就让它efant。妈妈只需用正确发音自然重复，不要说\"不对，再说一遍\"。纠正发音会打击输出积极性，得不偿失。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:0.85rem\">3️⃣ <b>可以开始尝试简单句型输入</b><br>43个单词的基础已经足够开始句型构建的<b>输入准备</b>了。妈妈在日常中开始用简单句：<br>• This is a tiger. → That is a lion.<br>• I see a deer. → Do you see the owl?<br>• Where is the sofa? → There is the sofa.<br>不需要Cora立刻说句型，妈妈说整句她在听就够了。</div><div style=\"background:#e0f2fe;border-radius:8px;padding:8px 12px;font-size:0.85rem\">4️⃣ <b>里程碑定位</b><br>当前阶段：<b>指认对应（后期）→ 句型输入过渡期</b><br>Cora的输出已知区域正在快速扩大。现在最重要的是：保持输入质量，不催输出速度。指认阶段的目标不是认识多少个词，而是<b>为句型构建打下坚实的词汇基础</b>。44个自发词，基础已经非常扎实了。</div></div>","tip":"44个自发词！20天新增17个，动物类涨到13个。Cora正处于指认后期的丰收阶段，可以开始妈妈说整句做句型输入准备了。","category":"growth","tags":["综合进度","43个词","hamgurber","发音简化","动物词","oval","onions","daddy","TPR","里程碑"],"date":"2026-07-02"},{"displayTitle":"彩虹兔欢唱童谣《A Sailor Went to Sea》·亲子共读指南","sections":[{"title":"📖 基本信息","words":[{"en":"彩虹兔欢唱童谣系列","ipa":"","cn":"可毛毛虫点读，含绘本+儿歌音频，适合1-4岁"},{"en":"童谣类型","ipa":"","cn":"经典英语童谣，节奏感强，适合边唱边做动作"},{"en":"这首歌讲什么","ipa":"","cn":"水手去航海，去看大海到底有多深、多蓝，海底能看到什么"}]},{"title":"🎵 歌词全文","words":[{"en":"A sailor went to sea, sea, sea","ipa":"","cn":"一个水手去航海，航海，航海"},{"en":"To see what he could see, see, see","ipa":"","cn":"去看他能看到什么，什么，什么"},{"en":"But all that he could see, see, see","ipa":"","cn":"但他所能看到的一切，一切，一切"},{"en":"Was the bottom of the deep blue sea, sea, sea!","ipa":"","cn":"就是深蓝色大海的底部！"}]},{"title":"📝 核心词汇","words":[{"en":"sailor","ipa":"/ˈseɪlər/","cn":"水手"},{"en":"sea","ipa":"/siː/","cn":"大海"},{"en":"see","ipa":"/siː/","cn":"看见"},{"en":"deep","ipa":"/diːp/","cn":"深的"},{"en":"blue","ipa":"/bluː/","cn":"蓝色的"},{"en":"bottom","ipa":"/ˈbɒtəm/","cn":"底部"},{"en":"swimming","ipa":"/ˈswɪmɪŋ/","cn":"游泳"}]},{"title":"🐠 画面指认·海洋动物","words":[{"en":"dolphin","ipa":"/ˈdɒlfɪn/","cn":"海豚"},{"en":"jellyfish","ipa":"/ˈdʒelifɪʃ/","cn":"水母"},{"en":"crab","ipa":"/kræb/","cn":"螃蟹"},{"en":"seahorse","ipa":"/ˈsiːhɔːrs/","cn":"海马"},{"en":"seastar","ipa":"/ˈsiːstɑːr/","cn":"海星（彩虹兔用seastar，不是starfish）"},{"en":"eel","ipa":"/iːl/","cn":"鳗鱼"},{"en":"octopus","ipa":"/ˈɒktəpəs/","cn":"章鱼"}]},{"title":"🦔 画面指认·海底生物","words":[{"en":"urchin","ipa":"/ˈɜːrtʃɪn/","cn":"海胆"},{"en":"seaweed","ipa":"/ˈsiːwiːd/","cn":"海草"}]},{"title":"🎒 画面指认·物品装备","words":[{"en":"diving suit","ipa":"/ˈdaɪvɪŋ suːt/","cn":"潜水服"},{"en":"goggles","ipa":"/ˈɡɒɡlz/","cn":"游泳镜"},{"en":"telescope","ipa":"/ˈtelɪskoʊp/","cn":"望远镜"}]},{"title":"🎬 封面怎么讲","words":[{"en":"Look! A sailor!","ipa":"","cn":"指着封面水手，让宝宝看"},{"en":"A sailor went to sea!","ipa":"","cn":"用夸张的语气读出标题"},{"en":"Can you say 'sea'?","ipa":"","cn":"引导宝宝发音"}]},{"title":"🎢 逐页画面互动","words":[{"en":"What can you see?","ipa":"","cn":"每翻一页都问，指着图中动物让宝宝找"},{"en":"I see a dolphin!","ipa":"","cn":"你先示范，指着海豚说"},{"en":"Where is the crab?","ipa":"","cn":"让宝宝找螃蟹在哪"},{"en":"Look at the jellyfish! It's swimming!","ipa":"","cn":"指水母，做游泳动作"},{"en":"What is the crab doing?","ipa":"","cn":"问螃蟹在干嘛，引导观察"}]},{"title":"🤸 TPR动作配合","words":[{"en":"swimming","ipa":"","cn":"双手做划水动作"},{"en":"deep","ipa":"","cn":"手臂往下压，表示很深"},{"en":"see","ipa":"","cn":"双手放在眼睛上做望远镜状"},{"en":"sea, sea, sea","ipa":"","cn":"配合歌曲节奏，手做波浪动作左右摆动"}]}],"answer":"<div style=\"padding:0.6rem 0\"><b>🔄 亲子共读流程：</b><br>1. <b>先听儿歌</b> → 放点读笔音频或扫码听，让宝宝感受节奏（读绘本前先听2-3遍）<br>2. <b>翻书指认</b> → 边翻页边指图中动物，说 <i>Look, a dolphin!</i><br>3. <b>唱唱跳跳</b> → 播放儿歌，边唱边做TPR动作，让宝宝参与<br>4. <b>问答互动</b> → <i>What can you see?</i> 让宝宝指</div><div style=\"padding:0.6rem 0;border-top:1px dashed #eee\"><b>💡 17个月宝宝实操建议：</b><br>1. 先指后说：先指着图中的动物，停顿2秒等宝宝反应，再说英文<br>2. 每次只聚焦3-4个核心词：第一周 dolphin/crab/jellyfish 就够了<br>3. 画面指认 > 歌词背诵：17个月宝宝重点是认识这些海洋动物，不是背歌词<br>4. TPR动作配合：swimming做划水、deep往下压、see做望远镜，动作比语言先输出<br>5. 这首歌节奏感很强，可以边走边拍手给宝宝唱，当背景输入</div>","tip":"彩虹兔版和Super Simple Songs版的动物种类不同！彩虹兔有dolphin/eel/urchin/seastar，SSS版是fish/octopus/shark。注意区分，不要混用。彩虹兔用seastar而非starfish。","category":"books","tags":["A Sailor Went to Sea","彩虹兔","欢唱童谣","绘本","海洋动物","童谣词汇","TPR"],"date":"2026-06-16"},{"displayTitle":"睡觉场景亲子英语口语","sections":[{"title":"🛏 准备睡觉","words":[{"en":"It's bedtime.","ipa":"","cn":"该睡了"},{"en":"Let's clean up.","ipa":"","cn":"收玩具"},{"en":"Time to sleep.","ipa":"","cn":"该睡了"},{"en":"Let's go to bed.","ipa":"","cn":"去睡觉"}]},{"title":"🧴 洗漱换衣","words":[{"en":"Let's wash your hands.","ipa":"","cn":"洗手"},{"en":"Let's change your diaper.","ipa":"","cn":"换尿不湿"},{"en":"All clean!","ipa":"","cn":"干净了"},{"en":"Let's put on your pajamas.","ipa":"","cn":"穿睡衣"},{"en":"Arms up!","ipa":"","cn":"举手"},{"en":"There we go!","ipa":"","cn":"好啦"}]},{"title":"🌙 躺下关灯","words":[{"en":"Lie down, please.","ipa":"","cn":"躺下"},{"en":"Let's cover you up.","ipa":"","cn ful words","水果","日常","食物"],"date":"2026-07-02"},{"displayTitle":"1000 Useful Words·鸟类","sections":[{"title":"🐔 农场家禽 Farm Birds","words":[{"en":"chick","ipa":"/tʃɪk/","cn":"小鸡"},{"en":"chicken","ipa":"/ˈtʃɪkɪn/","cn":"鸡"},{"en":"hen","ipa":"/hen/","cn":"母鸡"},{"en":"rooster","ipa":"/ˈruːstər/","cn":"公鸡"},{"en":"duck","ipa":"/dʌk/","cn":"鸭子"},{"en":"goose","ipa":"/ɡuːs/","cn":"鹅"},{"en":"turkey","ipa":"/ˈtɜːrki/","cn":"火鸡"}]},{"title":"🐦 常见鸟类 Common Birds","words":[{"en":"bird","ipa":"/bɜːrd/","cn":"鸟"},{"en":"sparrow","ipa":"/ˈspæroʊ/","cn":"麻雀"},{"en":"pigeon","ipa":"/ˈpɪdʒɪn/","cn":"鸽子"},{"en":"swallow","ipa":"/ˈswɑːloʊ/","cn":"燕子"},{"en":"crow","ipa":"/kroʊ/","cn":"乌鸦"},{"en":"seagull","ipa":"/ˈsiːɡʌl/","cn":"海鸥"},{"en":"woodpecker","ipa":"/ˈwʊdpekər/","cn":"啄木鸟"}]},{"title":"🦚 特色鸟类 Special Birds","words":[{"en":"owl","ipa":"/aʊl/","cn":"猫头鹰"},{"en":"parrot","ipa":"/ˈpærət/","cn":"鹦鹉"},{"en":"eagle","ipa":"/ˈiːɡl/","cn":"老鹰"},{"en":"swan","ipa":"/swɑːn/","cn":"天鹅"},{"en":"peacock","ipa":"/ˈpiːkɑːk/","cn":"孔雀"},{"en":"penguin","ipa":"/ˈpeŋɡwɪn/","cn":"企鹅"},{"en":"flamingo","ipa":"/fləˈmɪŋɡoʊ/","cn":"火烈鸟"},{"en":"hummingbird","ipa":"/ˈhʌmɪŋbɜːrd/","cn":"蜂鸟"},{"en":"ostrich","ipa":"/ˈɑːstrɪtʃ/","cn":"鸵鸟"}]}],"tip":"出门时指给宝宝看鸟：Look, a bird! 公园喂鸽子、池塘看鸭子都是绝佳输入场景。学动物叫声效果加倍：The duck says quack quack! The rooster says cock-a-doodle-doo!","category":"vocab","tags":["1000 useful words","鸟类","动物","户外"],"date":"2026-07-02"},{"displayTitle":"每一本分级怎么读才算过？","question":"每一本分级怎么读才算过？——6步精读法","answer":"<div style=\"padding:0.6rem 0\"><b>📖 Susan的分级精读6步法</b></div><div style=\"padding:0.4rem 0;color:#555;font-size:0.85rem\">不是读一遍就换下一本！每一本分级读物都要反复读一周，至少过6遍才算真正消化。</div><div style=\"padding:0.4rem 0\"><b>Step 1 翻翻看</b>：拿到新书先翻一遍，建立初步印象，不需要逐字读。</div><div style=\"padding:0.4rem 0\"><b>Step 2 读图</b>：只看图不看字，和宝宝一起讨论画面——What do you see? What's happening? 让宝宝先建立故事理解。</div><div style=\"padding:0.4rem 0\"><b>Step 3 跟读</b>：家长读一句，宝宝跟读一句。不需要跟读完全正确，能说几个核心词就很好。</div><div style=\"padding:0.4rem 0\"><b>Step 4 扩展</b>：在原文基础上拓展讨论——What color is the...? Do you like...? 把书里的词汇用到日常对话中。</div><div style=\"padding:0.4rem 0\"><b>Step 5 引导输出</b>：鼓励宝宝自己翻页讲述——What happened? Tell me the story. 宝宝能用自己的话复述就过关了。</div><div style=\"padding:0.4rem 0\"><b>Step 6 讲书</b>：终极考验！合上书让宝宝从头讲一遍。能用中文讲也行，能夹杂英文更好。重点是故事理解，不是逐字背诵。</div><div style=\"padding:0.4rem 0;color:#e74c3c\"><b>⚠️ 关键原则：反复读一周！</b>一本分级不要只读一天就换。每天至少读一遍同一本，连续读5-7天，让宝宝从陌生→熟悉→能跟读→能输出。同时用其他书作为\"背景输入\"，亲子共读时家长正常读，不要求宝宝跟读。</div>","tip":"Cora 17个月还在绘本阶段，分级暂时不用。但可以先翻翻看+读图，培养阅读习惯。正式分级等2岁以后再开始。","category":"methods","tags":["分级阅读","精读法","6步法","跟读","输出引导"],"date":"2026-07-02"},{"displayTitle":"启蒙很久了咋还不开口？如何引导输出？","question":"启蒙很久了，咋还不开口？如何引导输出？","answer":"<div style=\"padding:0.6rem 0\"><b>🗣️ 引导输出的年龄分层策略</b></div><div style=\"padding:0.4rem 0;color:#555;font-size:0.85rem\">自如交流是很难的。引导输出的原则要<b>降级降级再降级</b>。一定量的词汇 + 很简单的句型，就是最好的起点。</div><div style=\"padding:0.4rem 0;background:#e8f4fd;border-radius:6px;padding:8px\"><b>👶 0-2岁：游戏互动有回馈即可</b><br>宝宝能回应你的互动（点头、摇头、指东西、模仿动作）就是输出。不需要逼宝宝开口。</div><div style=\"padding:0.4rem 0;background:#e8f4fd;border-radius:6px;padding:8px\"><b>🧒 2岁以上：引导说整句</b><br>家长整句说一遍，孩子说一遍。从最简单的 It's a... 开始。</div><div style=\"padding:0.4rem 0;background:#e8f4fd;border-radius:6px;padding:8px\"><b>👦 3-6岁：句型可以复杂一点</b><br>如果启蒙晚，也要从简单的开始。<b>已知区域+1</b>——在宝宝已掌握的词汇/句型基础上，每次只加一个新元素。</div><div style=\"padding:0.4rem 0\"><b>🔑 核心方法：降级 + Creative</b><br>不要翻译！让英语直接对应实物/动作。如果宝宝不说，就降级到更简单的句型。</div><div style=\"padding:0.6rem 0\"><b>📊 句型升级路径（以monkey为例）</b></div><div style=\"padding:0.4rem 0\">已知单词 monkey → <b>It's a monkey.</b><br>学了颜色 → <b>It's a brown monkey. What color is it? It's brown.</b><br>学了like → <b>A monkey likes bananas. I like bananas too.</b></div><div style=\"padding:0.6rem 0\"><b>🃏 卡片游戏实操</b></div><div style=\"padding:0.4rem 0\">1. 准备 monkey 和 banana 的卡片<br>2. <b>It's a monkey, it's a banana.</b><br>3. <b>A monkey likes bananas.</b><br>4. <b>A monkey wants to eat bananas.</b><br>5. <b>There are some bananas over there. Look, a monkey is running to the bananas.</b></div>","tip":"Cora目前17个月，在0-2岁阶段。游戏互动有回馈就是输出。不用焦虑开口问题。","category":"methods","tags":["引导输出","降级原则","已知区域+1","句型升级","开口","卡片游戏"],"date":"2026-07-02"}];

// ===== NoRepeatRandom =====
class NoRepeatRandomSB {
  constructor(items) { this.items = [...items]; this.remaining = [...items]; this.totalCount = items.length; this.usedCount = 0; }
  getNext() {
    if(this.remaining.length === 0) { this.remaining = [...this.items]; this.usedCount = 0; }
    var idx = Math.floor(Math.random() * this.remaining.length);
    var sel = this.remaining[idx]; this.remaining.splice(idx, 1); this.usedCount++;
    return { item: sel, progress: this.usedCount, total: this.totalCount, isRoundComplete: this.remaining.length === 0 };
  }
  reset() { this.remaining = [...this.items]; this.usedCount = 0; }
}

var sbPractice = {
  KEY: 'baby-sb-practice',
  SESSION_KEY: 'baby-sb-session',
  getAll: function() { try { return JSON.parse(localStorage.getItem(this.KEY)) || { a: {}, b: {} }; } catch(e) { return { a: {}, b: {} }; } },
  save: function(d) { localStorage.setItem(this.KEY, JSON.stringify(d)); },
  getSessions: function(type) { try { var all = JSON.parse(localStorage.getItem(this.SESSION_KEY)) || {}; return all[type] || {}; } catch(e) { return {}; } },
  saveSessions: function(type, s) { var all = JSON.parse(localStorage.getItem(this.SESSION_KEY) || '{}'); all[type] = s; localStorage.setItem(this.SESSION_KEY, JSON.stringify(all)); },
  addClick: function(type, sentence) {
    if(!sentence) return;
    var sessions = this.getSessions(type);
    if(!sessions[sentence]) sessions[sentence] = { clicks: 0, earned: false };
    if(sessions[sentence].earned) return;
    sessions[sentence].clicks++;
    this.saveSessions(type, sessions);
    if(sessions[sentence].clicks >= 5) {
      var d = this.getAll();
      d[type][sentence] = (d[type][sentence] || 0) + 1;
      this.save(d);
      sessions[sentence].earned = true;
      this.saveSessions(type, sessions);
      return true; // earned this round
    }
    return false;
  },
  count: function(type, sentence) { return this.getAll()[type][sentence] || 0; },
  resetSession: function(type, sentence) {
    var sessions = this.getSessions(type);
    sessions[sentence] = { clicks: 0, earned: false };
    this.saveSessions(type, sessions);
  },
  clear: function(type) {
    var d = this.getAll();
    d[type] = {};
    this.save(d);
    var all = JSON.parse(localStorage.getItem(this.SESSION_KEY) || '{}');
    all[type] = {};
    localStorage.setItem(this.SESSION_KEY, JSON.stringify(all));
  }
};

function sbUpdateCustomOpts(type, dropdown) {

function initCustomSelect(customId, hiddenSelId, sentences, type) {
  var container = document.getElementById(customId);
  var trigger = container.querySelector('.sb-select-trigger');
  var dropdown = container.querySelector('.sb-select-dropdown');
  var hiddenSel = document.getElementById(hiddenSelId);
  sentences.forEach(function(s) {
    var opt = document.createElement('div');
    opt.className = 'sb-select-opt unpracticed';
    opt.dataset.value = s;
    opt.textContent = '○ ' + s;
    dropdown.appendChild(opt);
  });
  sbUpdateCustomOpts(type, dropdown);
  // Open/close
  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('.sb-custom-select.open').forEach(function(el) { if(el !== container) el.classList.remove('open'); });
    container.classList.toggle('open');
    sbUpdateCustomOpts(type, dropdown);
  });
  // Select option — do NOT set trigger text here, let change handler do it
  dropdown.addEventListener('click', function(e) {
    var opt = e.target.closest('.sb-select-opt');
    if(!opt) return;
    var v = opt.dataset.value;
    if(!v) return;
    hiddenSel.value = v;
    hiddenSel.dispatchEvent(new Event('change'));
    container.classList.remove('open');
  });
  document.addEventListener('click', function() { container.classList.remove('open'); });
}

}

// ===== Speak =====
function speak(text, btn) {
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  // Try pre-generated audio file first (works with Bluetooth/AirPods)
  var word = text.trim().toLowerCase();
  var audioSrc = null;
  if(sbCurNoun && sbCurNoun.word.toLowerCase() === word) audioSrc = 'audio/noun_' + word.replace(/ /g,'_').replace(/\//g,'_') + '.wav';
  else if(sbCurVerb && sbCurVerb.word.toLowerCase() === word) audioSrc = 'audio/verb_' + word.replace(/ /g,'_').replace(/\//g,'_') + '.wav';
  if(audioSrc) {
    if(btn) { var orig = btn.textContent; btn.textContent = '⏳'; }
    var a = new Audio(audioSrc);
    a.onended = function() { if(btn) btn.textContent = orig; };
    a.onerror = function() { if(btn) btn.textContent = orig; };
    a.play();
    return;
  }
  // Fallback to speechSynthesis for QA section words
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.8;
  var voices = window.speechSynthesis.getVoices();
  for(var i = 0; i < voices.length; i++) { if(voices[i].lang.indexOf('en') === 0 && voices[i].name.indexOf('Female') > -1) { u.voice = voices[i]; break; } }
  if(btn) { var orig = btn.textContent; btn.textContent = '⏳'; u.onend = function() { btn.textContent = orig; }; u.onerror = function() { btn.textContent = orig; }; }
  window.speechSynthesis.speak(u);
}
